<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprinten — Health Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600;700;800&family=Noto+Sans+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
:root{
/* semantic palette — source of truth */
--success:#00C48C;--info:#5ca8e8;--warning:#f5a623;--critical:#ff8a8a;--highlight:#b580f0;--aux:#38bdf8;
/* accent aliases */
--accent1:var(--info);--accent2:var(--critical);--accent3:var(--warning);--accent4:var(--highlight);--accent5:var(--success);--accent6:var(--aux);
--accent1-dim:rgba(92,168,232,0.1);--accent2-dim:rgba(255,138,138,0.1);--accent3-dim:rgba(245,166,35,0.1);--accent4-dim:rgba(181,128,240,0.1);--accent5-dim:rgba(0,196,140,0.1);--accent6-dim:rgba(56,189,248,0.1);
--accent1-border:rgba(94,165,237,0.25);--accent2-border:rgba(236,120,120,0.25);--accent3-border:rgba(249,146,56,0.25);--accent4-border:rgba(182,140,242,0.25);--accent5-border:rgba(0,204,129,0.25);
--accent1-light:#7ec8e3;--accent5-bright:#5BEDB3;
/* surfaces */
--bg:#111a27;--surface:#17202e;--card:#1e2733;--card2:#181f29;
--border:#2d3a4c;--border-hover:#4c617f;--border-soft:rgba(45,58,76,0.4);
/* text */
--text:#e8eef6;--text2:#a3b4c8;--text3:#6b7f99;
/* ui tokens */
--primary:#3074e2;--secondary:#ef8e8e;--accent:#b68cf2;--white:#fff;--neutral:#9aabbf;
--radius:8px;--track:rgba(57,73,95,0.5);--row-hover:rgba(94,165,237,0.03);--zone-empty:rgba(255,255,255,0.03);
/* chart tokens */
--chart-grid:rgba(36,44,55,0.6);--chart-tick:rgba(148,163,184,0.75);--tooltip-bg:rgba(15,23,42,0.9);--tooltip-border:rgba(71,85,105,0.6);
/* typography */
--font:'Noto Sans',sans-serif;--mono:'Noto Sans Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);font-weight:500;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.bg-ring{position:fixed;border-radius:50%;pointer-events:none;z-index:0;border:1px solid var(--accent1-dim)}
.ring1{width:700px;height:700px;top:-200px;right:-200px}.ring2{width:400px;height:400px;top:-50px;right:50px;border-color:var(--accent4-dim)}.ring3{width:200px;height:200px;bottom:100px;left:-80px;border-color:var(--accent3-dim)}
/* ── sidebar layout ── */
.app{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--card);border-right:1px solid var(--border);position:fixed;top:0;left:0;bottom:0;z-index:100;display:flex;flex-direction:column;overflow-y:auto}
.sidebar-logo{padding:20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.sidebar-logo svg{width:28px;height:21px}.sidebar-logo span{font-size:1rem;font-weight:700;letter-spacing:-0.02em}
.sidebar-nav{padding:12px;flex:1;display:flex;flex-direction:column;gap:2px}
.sidebar-btn{display:flex;align-items:center;gap:10px;padding:10px 14px;border:none;background:none;color:var(--text3);font-family:var(--font);font-size:0.82rem;font-weight:600;cursor:pointer;border-radius:8px;transition:all .15s;text-align:left;width:100%}
.sidebar-btn:hover{color:var(--text);background:var(--surface)}
.sidebar-btn.active{color:var(--white);background:var(--primary)}
.sidebar-btn .sb-icon{width:20px;text-align:center;font-size:14px}
.sidebar-footer{padding:16px;border-top:1px solid var(--border);font-size:9px;color:var(--text3);line-height:1.5}
.main-wrap{margin-left:220px;flex:1;position:relative;z-index:1}
.main{max-width:1400px;margin:0 auto;padding:24px 28px}
/* ── stat strip ── */
.stat-strip{display:grid;grid-template-columns:repeat(6,1fr);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:20px;background:var(--card)}
.stat-cell{padding:18px 20px;border-right:1px solid var(--border);position:relative}
.stat-cell:last-child{border-right:none}
.stat-lbl{font-size:10px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.stat-val{font-family:var(--mono);font-size:28px;font-weight:700;line-height:1;color:var(--text)}
.stat-val .u{font-size:12px;font-weight:500;color:var(--text2);margin-left:2px}
.stat-sub{font-size:11px;color:var(--text3);margin-top:5px}
.stat-bar{position:absolute;bottom:0;left:0;height:2px;width:100%}
.stat-trend{font-size:10px;font-weight:700;margin-top:4px;display:inline-flex;align-items:center;gap:3px;letter-spacing:0.1px;padding:1px 5px;border-radius:3px}
.stat-trend.up{color:var(--accent5);background:var(--accent5-dim)}.stat-trend.dn{color:var(--accent2);background:var(--accent2-dim)}.stat-trend.nt{color:var(--accent3);background:var(--accent3-dim)}.stat-trend.info{color:var(--accent1);background:var(--accent1-dim)}
/* ── insight grid ── */
.insight-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:20px}
.insight{background:var(--surface);padding:16px 22px;display:flex;gap:14px;align-items:flex-start}
.insight-ico{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.ico-cyan{background:var(--accent1-dim)}.ico-rose{background:var(--accent2-dim)}.ico-amber{background:var(--accent3-dim)}.ico-emerald{background:var(--accent5-dim)}.ico-violet{background:var(--accent4-dim)}.ico-sky{background:var(--accent6-dim)}
.insight-lbl{font-size:10px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;color:var(--text3);margin-bottom:3px}
.insight-txt{font-size:12px;color:var(--text2);line-height:1.6}
.insight-txt b{color:var(--text);font-weight:600}
.hi-cyan{color:var(--accent1)!important;font-weight:600}.hi-rose{color:var(--accent2)!important;font-weight:600}.hi-amber{color:var(--accent3)!important;font-weight:600}.hi-emerald{color:var(--accent5)!important;font-weight:600}.hi-violet{color:var(--accent4)!important;font-weight:600}
/* ── cards ── */
.grid2{display:grid;grid-template-columns:repeat(12,1fr);gap:16px;margin-bottom:20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;animation:fadeUp .5s ease both}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-size:12px;font-weight:600;color:var(--text);letter-spacing:0.3px}
.card-sub{font-size:10px;font-weight:600;letter-spacing:0.6px;text-transform:uppercase;color:var(--text3);background:var(--surface);border:1px solid var(--border);padding:3px 8px;border-radius:4px}
.span3{grid-column:span 3}.span4{grid-column:span 4}.span5{grid-column:span 5}.span6{grid-column:span 6}.span7{grid-column:span 7}.span8{grid-column:span 8}.span12{grid-column:span 12}
/* ── progress bars ── */
.bar-track{height:6px;background:var(--track);border-radius:3px;flex:1;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .6s ease}
/* ── quality bars ── */
.quality-row{display:flex;align-items:center;gap:10px;padding:6px 0}
.quality-label{font-size:11px;color:var(--text2);min-width:50px;font-weight:600}
.quality-bar-bg{flex:1;height:8px;background:var(--track);border-radius:4px;overflow:hidden}
.quality-bar{height:100%;border-radius:4px;transition:width .6s}
.quality-pct{font-family:var(--mono);font-size:11px;font-weight:600;min-width:35px;text-align:right}
.quality-pct.up{color:var(--accent5)}.quality-pct.dn{color:var(--accent2)}.quality-pct.nt{color:var(--accent3)}
.quality-n{font-size:10px;color:var(--text3);min-width:70px}
/* ── kv rows ── */
.kv-rows{display:flex;flex-direction:column}
.kv-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border-soft);font-size:12px}
.kv-row:last-child{border-bottom:none}
.kv-key{color:var(--text2)}.kv-val{font-family:var(--mono);font-weight:600;color:var(--text)}
.kv-val.good{color:var(--accent5)}.kv-val.warn{color:var(--accent3)}.kv-val.danger{color:var(--accent2)}.kv-val.info{color:var(--accent1)}
/* ── rec cards ── */
.rec-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.rec-section-hd{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:0 0 12px;color:var(--text3);border-bottom:1px solid var(--border);grid-column:1/-1}
.rec-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;animation:fadeUp .5s ease both;position:relative;overflow:hidden}
.rec-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:10px 10px 0 0}
.rec-card.critical::before{background:linear-gradient(90deg,var(--accent2),transparent)}
.rec-card.important::before{background:linear-gradient(90deg,var(--accent3),transparent)}
.rec-card.advisory::before{background:linear-gradient(90deg,var(--accent5),transparent)}
.rec-card.target::before{background:linear-gradient(90deg,var(--accent1),transparent)}
.rec-badge{display:inline-flex;align-items:center;gap:5px;font-size:9px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;padding:3px 8px;border-radius:4px;margin-bottom:10px}
.badge-rose{background:var(--accent2-dim);color:var(--accent2);border:1px solid var(--accent2-border)}
.badge-amber{background:var(--accent3-dim);color:var(--accent3);border:1px solid var(--accent3-border)}
.badge-emerald{background:var(--accent5-dim);color:var(--accent5);border:1px solid var(--accent5-border)}
.badge-cyan{background:var(--accent1-dim);color:var(--accent1);border:1px solid var(--accent1-border)}
.badge-violet{background:var(--accent4-dim);color:var(--accent4);border:1px solid var(--accent4-border)}
.rec-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:8px;line-height:1.35}
.rec-body{font-size:12px;color:var(--text2);line-height:1.7}.rec-body b{color:var(--text);font-weight:600}
.wide{grid-column:1/-1}
.checklist{display:flex;flex-direction:column;gap:8px;margin-top:14px}
.check-item{display:flex;gap:10px;align-items:flex-start;font-size:12px;color:var(--text2);line-height:1.5;padding:6px 0}
.check-item .icon{font-size:14px;flex-shrink:0;margin-top:1px}.check-item b{color:var(--text);font-weight:600}
/* ── corr cards ── */
.corr-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px}
.corr-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.corr-name{font-size:12px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:6px}
.corr-badge{font-family:var(--mono);font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px}
.corr-explain{font-size:11px;color:var(--text2);line-height:1.5;margin-top:6px}
.corr-action{font-size:11px;color:var(--accent1);margin-top:6px;font-weight:500}
.corr-meter{height:4px;background:var(--track);border-radius:2px;margin-top:8px}
.corr-meter-fill{height:100%;border-radius:2px}
/* ── section / tabs ── */
.section-hd{font-size:13px;font-weight:700;letter-spacing:0.3px;color:var(--text);margin:20px 0 12px;display:flex;align-items:center;gap:8px}
.tab-bar{display:flex;gap:2px;margin-bottom:20px;position:relative;z-index:1}
.tab{font-size:12px;font-weight:600;letter-spacing:0.4px;padding:8px 18px;border-radius:8px;cursor:pointer;border:1px solid transparent;color:var(--text3);background:transparent;transition:all .15s}
.tab:hover{color:var(--text2);background:var(--surface)}
.tab.active{color:var(--text);background:var(--card);border-color:var(--border)}
.page{display:none}.page.active{display:block}
/* ── charts ── */
.chart-wrap{position:relative}
.h200{height:200px}.h220{height:220px}.h240{height:240px}.h260{height:260px}.h280{height:280px}.h300{height:300px}.h350{height:350px}
/* ── heatmap ── */
.heat-cell{width:11px;height:11px;border-radius:2px}
.cal-legend{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap}
.cal-legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text3)}
.cal-dot{width:11px;height:11px;border-radius:2px}
/* ── period compare ── */
.period-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.period-cell{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center}
.period-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.6px;color:var(--text3);margin-bottom:6px}
.period-val{font-family:var(--mono);font-size:16px;font-weight:700}
.period-delta{font-size:10px;font-weight:600;margin-top:4px}
/* ── muscle bars ── */
.mbar-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border-soft)}
.mbar-label{font-size:11px;color:var(--text2);min-width:80px;font-weight:600}
.mbar-track{flex:1;height:10px;background:var(--track);border-radius:5px;overflow:hidden}
.mbar-fill{height:100%;border-radius:5px;transition:width .6s}
.mbar-val{font-family:var(--mono);font-size:11px;color:var(--text);min-width:55px;text-align:right;font-weight:600}
/* ── exercise buttons ── */
.ex-btns{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
.ex-btn{font-size:10px;font-weight:600;padding:4px 10px;border-radius:4px;cursor:pointer;border:1px solid var(--border);background:none;color:var(--text3);transition:all .15s;font-family:var(--font)}
.ex-btn.active{background:var(--accent1);color:var(--white);border-color:var(--accent1)}
.ex-btn:hover{border-color:var(--accent1);color:var(--text)}
/* ── tables ── */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{text-align:left;padding:10px 12px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.6px;color:var(--text3);border-bottom:1px solid var(--border)}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--border-soft)}
.tbl tr:hover td{background:var(--row-hover)}
/* ── pbar (period bars) ── */
.pbar-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border-soft)}
.pbar-row:last-child{border-bottom:none}
.pbar-label{font-size:11px;color:var(--text2);min-width:120px;font-weight:600}
.pbar-bars{flex:1;display:flex;gap:8px;align-items:center}
.pbar-track{height:8px;border-radius:4px;overflow:hidden;flex:1}
.pbar-val{font-family:var(--mono);font-size:11px;color:var(--text);font-weight:600;min-width:35px;text-align:right}
/* ── animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.card:nth-child(1){animation-delay:.03s}.card:nth-child(2){animation-delay:.06s}.card:nth-child(3){animation-delay:.09s}.card:nth-child(4){animation-delay:.12s}.card:nth-child(5){animation-delay:.15s}.card:nth-child(6){animation-delay:.18s}
.rec-card:nth-child(1){animation-delay:.04s}.rec-card:nth-child(2){animation-delay:.08s}.rec-card:nth-child(3){animation-delay:.12s}.rec-card:nth-child(4){animation-delay:.16s}
/* ── responsive ── */
@media(max-width:900px){
  .sidebar{width:60px}.sidebar-btn span{display:none}.sidebar-logo span{display:none}.main-wrap{margin-left:60px}
  .stat-strip{grid-template-columns:repeat(3,1fr)}.insight-grid,.rec-grid{grid-template-columns:1fr}
  .grid2{grid-template-columns:1fr}.card{grid-column:span 1!important}.main{padding:12px}.stat-val{font-size:22px}
}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ══════════════════════════════════════════════════════════
   BIOMARKERS PAGE — bloodwork dashboard styles
   ══════════════════════════════════════════════════════════ */
.bw-wrap{padding-bottom:40px}
/* Status color map */
.col-optimal{color:var(--success)}.col-good{color:var(--info)}.col-fair{color:var(--warning)}.col-out{color:var(--critical)}.col-unknown{color:var(--text3)}
/* Summary pills */
.bw-summary{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.sum-pill{display:flex;align-items:center;gap:7px;padding:5px 12px;border-radius:100px;border:1px solid var(--border);background:var(--card);font-size:12px;font-weight:600}
.sum-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}.sum-label{color:var(--text2)}.sum-count{font-family:var(--mono);color:var(--text)}
/* Score pane */
.score-pane{width:220px;flex-shrink:0;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px 16px}
.score-date{font-family:var(--mono);font-size:10px;color:var(--text3);text-align:center;margin-bottom:2px}
.score-category{font-size:14px;font-weight:700;text-align:center;color:var(--text);margin-bottom:8px}
.score-gauge-wrap{display:flex;justify-content:center;margin-bottom:4px}
.score-legend{display:flex;justify-content:space-between;margin-bottom:14px}
.leg-item{display:flex;align-items:center;gap:3px;font-size:9px;color:var(--text3)}
.leg-dot{width:7px;height:7px;border-radius:50%}
.score-divider{height:1px;background:var(--border);margin-bottom:12px}
.score-breakdown{display:flex;flex-direction:column;gap:7px}
.bkd-row{display:flex;align-items:center;justify-content:space-between;font-size:12px}
.bkd-label{display:flex;align-items:center;gap:6px;color:var(--text2)}
.bkd-badge{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.bkd-count{font-family:var(--mono);font-weight:700;font-size:13px}
.score-desc{font-size:11px;color:var(--text3);line-height:1.55;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}
/* Markers pane */
.cat-body{display:flex;gap:20px;align-items:flex-start}
.markers-pane{flex:1;min-width:0}
.markers-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.markers-title{font-size:13px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px}
.markers-meta{font-family:var(--mono);font-size:11px;color:var(--text3)}
/* Marker card grid */
.cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.m-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);display:flex;overflow:hidden;transition:border-color 0.14s;min-height:0}
.m-card:hover{border-color:var(--border-hover)}
.m-accent{width:4px;flex-shrink:0}
.m-accent.optimal{background:var(--success)}.m-accent.good{background:var(--info)}.m-accent.fair{background:var(--warning)}.m-accent.out{background:var(--critical)}.m-accent.unknown{background:var(--text3)}
.m-body{flex:1;padding:11px 12px;min-width:0}
.m-row1{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;margin-bottom:4px}
.m-name{font-size:12px;font-weight:700;color:var(--text);line-height:1.3}
.badge{font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 7px;border-radius:100px;white-space:nowrap;flex-shrink:0}
.badge.optimal{color:var(--success);background:var(--accent5-dim);border:1px solid var(--accent5-border)}
.badge.good{color:var(--info);background:var(--accent1-dim);border:1px solid var(--accent1-border)}
.badge.fair{color:var(--warning);background:var(--accent3-dim);border:1px solid var(--accent3-border)}
.badge.out{color:var(--critical);background:var(--accent2-dim);border:1px solid var(--accent2-border)}
.badge.unknown{color:var(--text3);background:var(--accent1-dim);border:1px solid var(--border-soft)}
.m-row2{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.m-desc{font-size:11px;color:var(--text3)}
.m-val{display:flex;align-items:baseline;gap:3px}
.m-num{font-family:var(--mono);font-size:16px;font-weight:700}
.m-unit{font-size:10px;color:var(--text3)}
.m-na{font-family:var(--mono);font-size:12px;color:var(--text3)}
.m-gauge{margin-bottom:6px}.m-spark{display:block}
.m-delta{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:4px}
/* Insights */
.bw-insights{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}
.ins-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:13px 15px}
.ins-tag{font-family:var(--mono);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:5px}
.ins-body{font-size:12px;color:var(--text2);line-height:1.6}.ins-body strong{color:var(--text)}
.t-warn{color:var(--warning)}.t-ok{color:var(--success)}.t-info{color:var(--info)}.t-danger{color:var(--critical)}
/* Overall score panel */
.overall-panel{display:flex;gap:24px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:28px;align-items:center}
.overall-left{flex-shrink:0;text-align:center}
.overall-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:4px}
.overall-right{flex:1;min-width:0}
.overall-title{font-size:13px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.cat-chips{display:flex;flex-wrap:wrap;gap:8px}
.cat-chip{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);font-size:12px;font-weight:600;cursor:pointer;transition:border-color 0.15s,background 0.15s;text-decoration:none}
.cat-chip:hover{border-color:var(--border-hover);background:var(--surface)}
.cat-chip-icon{font-size:13px}.cat-chip-name{color:var(--text2)}.cat-chip-score{font-family:var(--mono);font-weight:700;font-size:13px}
/* Accordion */
.cat-section{border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;background:var(--card)}
.bw-section-hd{display:flex;align-items:center;gap:10px;padding:14px 18px;cursor:pointer;user-select:none;transition:background 0.14s;border-bottom:1px solid transparent}
.bw-section-hd:hover{background:var(--surface)}
.cat-section.open .bw-section-hd{border-bottom-color:var(--border)}
.toggle-arrow{width:18px;height:18px;flex-shrink:0;color:var(--text3);transition:transform 0.22s ease;display:flex;align-items:center;justify-content:center}
.cat-section.open .toggle-arrow{transform:rotate(90deg)}
.section-icon{font-size:15px;flex-shrink:0}
.section-name{font-size:14px;font-weight:700;color:var(--text)}
.section-spacer{flex:1}
.section-score-chip{display:flex;align-items:center;gap:7px;padding:4px 11px;border-radius:100px;border:1px solid var(--border);background:var(--bg);font-family:var(--mono);font-size:12px;font-weight:700;flex-shrink:0}
.section-score-num{font-size:15px}
.section-summary{display:flex;align-items:center;gap:10px;margin-left:8px}
.cat-section.open .section-summary{display:none}
.sum-mini{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text3);font-family:var(--mono)}
.sum-mini-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sum-mini-count{font-weight:700}
.sum-mini[data-n="0"]{opacity:0.3}
.section-body{display:grid;grid-template-rows:0fr;transition:grid-template-rows 0.28s ease}
.cat-section.open .section-body{grid-template-rows:1fr}
.section-body-inner{overflow:hidden}
.section-body-pad{padding:20px 18px 20px}
/* Biomarkers page header */
.bw-page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.bw-page-title{font-size:20px;font-weight:800;color:var(--text)}
.bw-page-title span{color:var(--secondary)}
.bw-header-meta{font-family:var(--mono);font-size:11px;color:var(--text3);text-align:right;line-height:1.8}
.bw-header-meta strong{color:var(--text2);font-weight:600}
/* Category grid (Overview) */
.bw-cat-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px}
.bw-cat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 14px 12px;cursor:pointer;transition:border-color .15s,background .15s;position:relative;overflow:hidden}
.bw-cat-card:hover{border-color:var(--border-hover);background:var(--surface)}
.bw-cat-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.bw-cat-icon{font-size:18px}
.bw-cat-score{font-family:var(--mono);font-size:20px;font-weight:800}
.bw-cat-name{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.bw-zone-bar{display:flex;height:5px;border-radius:3px;overflow:hidden;gap:1px;margin-bottom:6px}
.bw-zone-seg{height:100%;border-radius:2px}
.bw-cat-date{font-size:9px;color:var(--text3);font-family:var(--mono)}
/* Alert strip (Overview) */
.bw-alert-hd{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin:20px 0 10px;display:flex;align-items:center;gap:8px}
.bw-alert-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.bw-alert-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;position:relative;overflow:hidden}
.bw-alert-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.bw-alert-card.danger::before{background:linear-gradient(90deg,var(--critical),transparent)}
.bw-alert-card.warn::before{background:linear-gradient(90deg,var(--warning),transparent)}
.bw-alert-badge{display:inline-flex;align-items:center;gap:5px;font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:2px 7px;border-radius:4px;margin-bottom:7px;font-family:var(--mono)}
.bw-alert-badge.danger{background:var(--accent2-dim);color:var(--accent2);border:1px solid var(--accent2-border)}
.bw-alert-badge.warn{background:var(--accent3-dim);color:var(--accent3);border:1px solid var(--accent3-border)}
.bw-alert-title{font-size:12px;font-weight:700;color:var(--text);margin-bottom:5px}
.bw-alert-body{font-size:11px;color:var(--text2);line-height:1.6}.bw-alert-body strong{color:var(--text)}
.bw-alert-cat{font-size:10px;color:var(--text3);margin-top:6px;font-family:var(--mono)}
/* Marker Explorer (Trends) */
.bw-explorer{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px}
.bw-explorer-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.bw-explorer-title{font-size:13px;font-weight:700;color:var(--text)}
.bw-explorer-meta{font-size:10px;color:var(--text3)}
.bw-cat-filter{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
.bw-cat-btn{font-size:10px;font-weight:600;padding:4px 10px;border-radius:4px;cursor:pointer;border:1px solid var(--border);background:none;color:var(--text3);transition:all .15s;font-family:var(--font)}
.bw-cat-btn.active{background:var(--accent1);color:var(--white);border-color:var(--accent1)}
.bw-cat-btn:hover:not(.active){border-color:var(--accent1);color:var(--text)}
.bw-marker-filter{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:14px;min-height:28px}
.bw-mk-btn{font-size:10px;font-weight:600;padding:3px 9px;border-radius:4px;cursor:pointer;border:1px solid transparent;background:var(--surface);color:var(--text3);transition:all .15s;font-family:var(--font)}
.bw-mk-btn.sel{color:var(--white);border-color:transparent}
.bw-mk-btn:hover:not(.sel){border-color:var(--border);color:var(--text)}
.bw-chart-wrap{position:relative;height:280px}
.bw-legend-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px}
.bw-legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text2)}
.bw-legend-dot{width:10px;height:3px;border-radius:2px;flex-shrink:0}
/* Recommendations (Recs tab) */
.bw-rec-section{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin:20px 0 10px;display:flex;align-items:center;gap:8px}
.bw-rec-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:4px}
.bw-rec-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;position:relative;overflow:hidden;animation:fadeUp .4s ease both}

.bw-rec-card.danger::before{background:linear-gradient(90deg,var(--critical),transparent)}
.bw-rec-card.warn::before{background:linear-gradient(90deg,var(--warning),transparent)}
.bw-rec-card.info::before{background:linear-gradient(90deg,var(--accent1),transparent)}
.bw-rec-card.ok::before{background:linear-gradient(90deg,var(--accent5),transparent)}
.bw-rec-badge{display:inline-flex;align-items:center;gap:5px;font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:3px 8px;border-radius:4px;margin-bottom:8px;font-family:var(--mono)}
.bw-rec-badge.danger{background:var(--accent2-dim);color:var(--accent2);border:1px solid var(--accent2-border)}
.bw-rec-badge.warn{background:var(--accent3-dim);color:var(--accent3);border:1px solid var(--accent3-border)}
.bw-rec-badge.info{background:var(--accent1-dim);color:var(--accent1);border:1px solid var(--accent1-border)}
.bw-rec-badge.ok{background:var(--accent5-dim);color:var(--accent5);border:1px solid var(--accent5-border)}
.bw-rec-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:6px;line-height:1.35}
.bw-rec-body{font-size:11px;color:var(--text2);line-height:1.65}.bw-rec-body strong{color:var(--text)}
.bw-rec-cat{font-size:10px;color:var(--text3);margin-top:8px;font-family:var(--mono)}
/* Positive signals collapsible */
.bw-positives-toggle{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;padding:10px 0;color:var(--text3);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px}
.bw-positives-toggle:hover{color:var(--text2)}
.bw-positives-arrow{transition:transform .2s;font-size:10px}
.bw-positives-arrow.open{transform:rotate(90deg)}
/* Per-category explorer accordion (Trends tab) */
.bw-cat-explorer-section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
.bw-cat-exp-hd{display:flex;align-items:center;gap:10px;padding:13px 18px;cursor:pointer;user-select:none;transition:background .14s}

/* Enhanced overall card */
.bw-overall-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px;display:flex;gap:32px;align-items:flex-start}
.bw-overall-left{flex-shrink:0;text-align:center;width:200px}
.bw-overall-right{flex:1;min-width:0}
.bw-overall-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:4px}
.bw-overall-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.bw-overall-stat{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:12px 14px}
.bw-overall-stat-val{font-family:var(--mono);font-size:22px;font-weight:800;line-height:1}
.bw-overall-stat-lbl{font-size:10px;color:var(--text3);margin-top:4px;text-transform:uppercase;letter-spacing:.6px}
.bw-overall-zone-bar{height:8px;border-radius:4px;display:flex;overflow:hidden;gap:2px;margin-bottom:6px}
.bw-overall-zone-seg{height:100%;border-radius:3px}
.bw-overall-zone-legend{display:flex;gap:14px;flex-wrap:wrap}
.bw-overall-zone-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text2);font-family:var(--mono)}
.bw-overall-zone-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
/* Enhanced category card */
.bw-cat-flagged{font-size:10px;color:var(--text3);margin-top:4px;line-height:1.5}
.bw-cat-breakdown{display:flex;gap:6px;font-size:9px;font-family:var(--mono);margin-bottom:5px;flex-wrap:wrap}
/* ══ GOALS PAGE ══════════════════════════════════════════════════════ */
.gl-summary-strip{display:grid;grid-template-columns:repeat(4,1fr);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:20px;background:var(--card)}
.gl-stat{padding:16px 20px;border-right:1px solid var(--border);position:relative}
.gl-stat:last-child{border-right:none}
.gl-stat-lbl{font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
.gl-stat-val{font-family:var(--mono);font-size:26px;font-weight:800;color:var(--text)}
.gl-stat-sub{font-size:10px;color:var(--text3);margin-top:4px}
.gl-stat-bar{position:absolute;bottom:0;left:0;height:2px;width:100%}
.gl-domain-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.gl-domain-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 20px}
.gl-domain-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border-soft)}

.gl-goal-current{font-family:var(--mono);color:var(--text);font-weight:700;font-size:11px}

.in-radar-sub{font-size:10px;color:var(--text3);margin-bottom:12px}

.in-corr-name{font-size:12px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:7px}

.in-corr-fill{height:100%;border-radius:2px}

.in-rec-section-hd{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin:20px 0 10px;display:flex;align-items:center;gap:8px}
.in-rec-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:8px}
.in-rec-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 18px;position:relative;overflow:hidden;animation:fadeUp .4s ease both}
.in-rec-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:10px 10px 0 0}

.in-rec-badge.p1{background:var(--accent2-dim);color:var(--accent2);border:1px solid var(--accent2-border)}
.in-rec-badge.p2{background:var(--accent3-dim);color:var(--accent3);border:1px solid var(--accent3-border)}
.in-rec-badge.p3{background:var(--accent1-dim);color:var(--accent1);border:1px solid var(--accent1-border)}

// ── Fix 2: Deduplicate timeseries by date (split-night Withings records) ──
// For each date with duplicates: if records have distinct sleep_hours_w, sum their
// sleep time (non-overlapping sessions); merge other fields by keeping non-null values
// preferring the row with the longer/higher-quality sleep record.
(function deduplicateTimeseries(){
  const byDate={};
  D.timeseries.forEach(d=>{
    if(!byDate[d.date]) byDate[d.date]=[];
    byDate[d.date].push(d);
  });
  const deduped=[];
  Object.keys(byDate).sort().forEach(date=>{
    const rows=byDate[date];
    if(rows.length===1){deduped.push(rows[0]);return;}
    // Sum sleep_hours_w (non-overlapping Withings sessions)
    const totalSleepW=rows.reduce((a,r)=>a+(r.sleep_hours_w&&r.sleep_hours_w>0.5?r.sleep_hours_w:0),0);
    // Pick the row with the highest sleep_efficiency or longest sleep as base
    const base=rows.reduce((best,r)=>{
      const score=(r.sleep_efficiency||0)+(r.sleep_hours_w||0)*2;
      const bScore=(best.sleep_efficiency||0)+(best.sleep_hours_w||0)*2;
      return score>bScore?r:best;
    },rows[0]);
    // Merge all rows: for each field, pick first non-null value from any row
    const merged=Object.assign({},base);
    rows.forEach(r=>{
      Object.keys(r).forEach(k=>{
        if((merged[k]===null||merged[k]===undefined||Number.isNaN(merged[k]))&&r[k]!==null&&r[k]!==undefined&&!Number.isNaN(r[k])){
          merged[k]=r[k];
        }
      });
    });
    // Use summed sleep hours (capped reasonably)
    if(totalSleepW>0) merged.sleep_hours_w=Math.min(totalSleepW,12);
    deduped.push(merged);
  });
  D.timeseries=deduped;
})();

(function reconcileBodyFat(){
  const eufyByDate={};
  (D.eufy_wc||[]).forEach(e=>{eufyByDate[e.date]=e;});

          d.body_fat_pct=eufy.body_fat_pct;

      }
    } else {
      d._bf_source='withings';
    }
  });
})();

// ═══ SLEEP ═══
function rSleep(){
  const sl=D.sleep_stages,SG=D.sleep_gf_stats,QB=D.sleep_quality_bands;
  const aD=sl.reduce((a,d)=>a+(d.deep_pct||0),0)/sl.length;
  const aR=sl.reduce((a,d)=>a+(d.rem_pct||0),0)/sl.length;
  const aE=sl.reduce((a,d)=>a+(d.sleep_efficiency||0),0)/sl.length;
  const aH=sl.filter(d=>d.sleep_hr_avg).reduce((a,d)=>a+d.sleep_hr_avg,0)/sl.filter(d=>d.sleep_hr_avg).length;

  let h=`<div class="tab-bar" id="slTabs">
    <div class="tab active" onclick="showSub('sl','overview',this)">Overview</div>
    <div class="tab" onclick="showSub('sl','stages',this)">Sleep Stages</div>
    <div class="tab" onclick="showSub('sl','trends',this)">Trends</div>
    <div class="tab" onclick="showSub('sl','quality',this)">Night Quality</div>
    <div class="tab" onclick="showSub('sl','patternsHM',this)">Patterns</div>
    <div class="tab" onclick="showSub('sl','recs',this)">Recommendations ✦</div>
  </div>`;

  // ── Trend computations ──
  const slM2=D.sleep_monthly||[];const slLast3=slM2.slice(-3),slPrev3=slM2.slice(-6,-3);
  const slRA2=slLast3.length?+(slLast3.reduce((a,m)=>a+m.avg,0)/slLast3.length).toFixed(2):null;
  const slOA2=slPrev3.length?+(slPrev3.reduce((a,m)=>a+m.avg,0)/slPrev3.length).toFixed(2):null;
  const slTrend=slRA2&&slOA2?+(slRA2-slOA2).toFixed(2):null;
  const slTrendBadge=(v,u='h')=>{if(v==null)return'';const cls=v===0?'nt':v>0?'up':'dn';return`<span class="stat-trend ${cls}">${v>0?'▲':'▼'} ${Math.abs(v).toFixed(2)}${u} vs prev 3mo</span>`;};
  const effArr=(sl||[]).filter(d=>d.sleep_efficiency);const effR=effArr.slice(-10),effO=effArr.slice(-20,-10);
  const effRA=effR.length?+(effR.reduce((a,d)=>a+d.sleep_efficiency,0)/effR.length).toFixed(0):null;
  const effOA=effO.length?+(effO.reduce((a,d)=>a+d.sleep_efficiency,0)/effO.length).toFixed(0):null;
  const effTrend=effRA&&effOA?effRA-effOA:null;

  h+=`<div class="stat-strip">
    <div class="stat-cell"><div class="stat-lbl">Avg Sleep</div><div class="stat-val">${fmt(SG.avg,2)}<span class="u">h</span></div>${slTrendBadge(slTrend)}<div class="stat-sub">${SG.total_nights} nights · 2022–2026</div><div class="stat-bar" style="background:var(--accent1)"></div></div>
    <div class="stat-cell"><div class="stat-lbl">Median</div><div class="stat-val">${fmt(SG.median,2)}<span class="u">h</span></div><span class="stat-trend info">→ 50th pct</span><div class="stat-sub">50th percentile</div><div class="stat-bar" style="background:var(--accent6)"></div></div>
    <div class="stat-cell"><div class="stat-lbl">Best Year</div><div class="stat-val">${fmt(SG.best_year_avg,2)}<span class="u">h</span></div><span class="stat-trend up">▲ peak avg</span><div class="stat-sub">${SG.best_year} · ${SG.best_year_n} nights</div><div class="stat-bar" style="background:var(--accent5)"></div></div>
    <div class="stat-cell"><div class="stat-lbl">Nights ≥ 7h</div><div class="stat-val">${SG.pct_gte7}<span class="u">%</span></div><span class="stat-trend ${SG.pct_gte7>=50?'up':'nt'}">${SG.pct_gte7>=50?'▲':'→'} target 60%</span><div class="stat-sub">${SG.nights_gte7} of ${SG.total_nights}</div><div class="stat-bar" style="background:var(--accent3)"></div></div>
    <div class="stat-cell"><div class="stat-lbl">Nights &lt; 6h</div><div class="stat-val">${SG.pct_lt6}<span class="u">%</span></div><span class="stat-trend ${SG.pct_lt6<15?'up':'dn'}">${SG.pct_lt6<15?'↓ improving':'▲ deficit'}</span><div class="stat-sub"><span class="hi-rose">${SG.nights_lt6} deficit nights</span></div><div class="stat-bar" style="background:var(--accent2)"></div></div>
    <div class="stat-cell"><div class="stat-lbl">Bedtime</div><div class="stat-val" style="font-size:22px">${SG.typical_bedtime}</div>${effTrend!=null?`<span class="stat-trend ${effTrend>=0?'up':'dn'}">${effTrend>=0?'▲':'▼'} eff ${effTrend>=0?'+':''}${effTrend}%</span>`:''}  <div class="stat-sub">Typical</div><div class="stat-bar" style="background:var(--accent4)"></div></div>
  </div>`;

  // OVERVIEW
  h+=`<div class="page active" id="sl-overview">`;
  h+=insG([
    {emoji:'😴',title:`Still below 7h — but improving`,severity:'warn',text:`The median is ${fmt(SG.median,2)}h, just under 7h. Critically, ${SG.best_year} crossed the threshold with <span class="hi-emerald">${SG.best_year_avg}h average</span> — the best year on record.`},
    {emoji:'🦉',title:'Confirmed night owl',severity:'info',text:`Typical bedtime is <b>${SG.typical_bedtime}</b>. Most nights start around midnight. Waking at ~7 AM naturally caps sleep at 6–7h.`},
    {emoji:'📈',title:'Clear long-term improvement',severity:'good',text:`From 2022 to ${SG.best_year}: a sustained upward trend. Q4 2025 was the peak — your weight loss acceleration happened in the same period.`},
    {emoji:'☀️',title:'Summer sleep debt is real',severity:'warn',text:`June and July consistently produce the worst sleep, driven by lighter evenings and later social activity. Plan proactively with blackout curtains.`}
  ]);
  h+=`<div class="grid2">
    <div class="card span6"><div class="card-hd"><div class="card-title">Sleep duration distribution</div><div class="card-sub">${SG.total_nights} nights · 2022–2026</div></div><div class="chart-wrap h240"><canvas id="cSleepDist"></canvas></div></div>

        ${QB.map(b=>{const col=b.label==='≥8h'?'var(--accent5)':b.label==='7-8h'?'var(--accent6)':b.label==='6-7h'?'var(--accent3)':b.label==='5-6h'?cv('--accent3'):'var(--accent2)';const cls=b.label.includes('7')||b.label.includes('8')?'up':'dn';return `<div class="quality-row"><span class="quality-label">${b.label}</span><div class="quality-bar-bg"><div class="quality-bar" style="width:${b.pct}%;background:${col}"></div></div><span class="quality-pct ${cls}">${b.pct}%</span><span class="quality-n">${b.count} nights</span></div>`;}).join('')}
        <div style="font-size:11px;color:var(--text3);border-top:1px solid var(--border);padding-top:10px;margin-top:10px">
          <span style="color:var(--accent5)">■</span> Optimal (7h+): <b style="color:var(--text)">${QB.filter(b=>b.label.includes('7')||b.label.includes('8')).reduce((a,b)=>a+b.pct,0).toFixed(0)}%</b> &nbsp;
          <span style="color:var(--accent3)">■</span> Marginal (6–7h): <b style="color:var(--text)">${QB.find(b=>b.label==='6-7h')?.pct||0}%</b> &nbsp;
          <span style="color:var(--accent2)">■</span> Deficit (&lt;6h): <b style="color:var(--text)">${QB.filter(b=>b.label.includes('<5')||b.label.includes('5-6')).reduce((a,b)=>a+b.pct,0).toFixed(0)}%</b>
        </div>
      </div>
    </div>
  </div>
  <div class="card"><div class="card-hd"><div class="card-title">Monthly average sleep</div><div class="card-sub">${SG.total_nights} nights · shaded band = 7–9h zone</div></div><div class="chart-wrap h260"><canvas id="cSleepMonthly"></canvas></div></div>
  </div>`;

  // STAGES (Withings)
  h+=`<div class="page" id="sl-stages">`;
  h+=insG([
    {emoji:'💤',title:`Deep sleep: ${fmt(aD,0)}%`,severity:aD>=15?'good':'warn',text:`Physical recovery phase. ${aD>=15?'Within 15-20% ideal.':'Below 15% minimum. Magnesium, cool room, no alcohol.'}`},
    {emoji:'🧠',title:`REM: ${fmt(aR,0)}%`,severity:aR>=20?'good':'warn',text:`Memory consolidation. ${aR>=20?'Hitting target.':'Aim for 20-25%. Consistent sleep timing helps.'}`},
    {emoji:'⚡',title:`Efficiency: ${fmt(aE,0)}%`,severity:aE>=85?'good':'warn',text:`${aE>=85?'Good — most bed time is actual sleep.':'Room for improvement. Reduce time in bed awake.'}`},
    {emoji:'❤️',title:`Sleep HR: ${fmt(aH,0)} bpm`,severity:'info',text:`Average heart rate during sleep. Lower = better cardiovascular fitness and recovery.`}
  ]);
  h+=`<div class="grid2">
    <div class="card span5"><div class="card-hd"><div class="card-title">Stage distribution</div><div class="card-sub">Withings · ${sl.length} nights</div></div><div class="chart-wrap h240"><canvas id="cStagePie"></canvas></div></div>

  // TRENDS
  h+=`<div class="page" id="sl-trends">`;
  h+=insG([
    {emoji:'🏆',title:'Q4 2025 was your sleep peak',severity:'good',text:'Oct: 7.90h · Nov: 7.53h · Dec: 7.60h. Three consecutive months above 7.5h — your longest healthy streak, aligning with weight loss acceleration.'},
    {emoji:'📉',title:'Early 2026 is softening',severity:'warn',text:'Jan 26: 6.76h · Feb 26: 7.19h · Mar 26: 6.57h. The downtrend from Q4 mirrors the slight weight uptick in March.'},
    {emoji:'🔁',title:'Annual summer dip is structural',severity:'info',text:'Every year shows a Jun–Jul trough. Plan proactively — blackout curtains, earlier alarms, reduced screen time.'}
  ]);
  h+=`<div class="grid2">
      <div class="card span6"><div class="card-hd"><div class="card-title">Yearly sleep average</div><div class="card-sub">Mean hours per year</div></div><div class="chart-wrap h240"><canvas id="cSleepYearly"></canvas></div></div>
      <div class="card span6"><div class="card-hd"><div class="card-title">Rolling 30-night average</div><div class="card-sub">Smoothed trend · dashed = 7h target</div></div><div class="chart-wrap h240"><canvas id="cRolling30"></canvas></div></div>

    <div class="stat-cell"><div class="stat-lbl">Variability</div><div class="stat-val">±${fmt(A.cal_variability,0)}<span class="u">kcal</span></div>${A.cal_variability>700?tElRaw('▲ high variance','dn'):tElRaw('▼ stable','up')}<div class="stat-sub">${A.cal_variability>700?'<span class="hi-rose">High</span>':'<span class="hi-emerald">Stable</span>'}</div><div class="stat-bar" style="background:var(--accent6)"></div></div>

  // OVERVIEW
  h+=`<div class="page active" id="nu-overview">`;
  h+=insG([
    {emoji:'🥩',title:'Protein gap is #1 issue',severity:'critical',text:`Averaging <b>${fmt(A.protein,0)}g</b> vs <span class="hi-rose">${T.protein}g target</span>. That's ${fmt(A.protein/83,1)}g/kg — well below 1.8g/kg recomp threshold.`},
    {emoji:'📊',title:'Total calories well-calibrated',severity:'good',text:`<span class="hi-emerald">${fmtC(Math.round(A.calories))} kcal</span> ≈ ${fmtC(T.calories)} target. Same calories, more protein, less variance.`},
    {emoji:'📅',title:'Weekend spike +29%',severity:'warn',text:`Combined with ±${fmt(A.cal_variability,0)} kcal daily variance, the feast/famine cycle undermines recomp.`},
    {emoji:'🥦',title:`Fiber at ${fmt(A.fiber,0)}g`,severity:'warn',text:`Below 30g target. Add legumes or whole grains at one meal.`}

  h+=`<div class="grid2">
    <div class="card span5"><div class="card-hd"><div class="card-title">Macro split</div><div class="card-sub">Avg % of calories</div></div><div class="chart-wrap h240"><canvas id="cMacro"></canvas></div></div>

  // MEAL TIMING (enhanced with hourly + DOW + periods)

      <div style="font-size:10px;color:var(--text3);margin-top:8px"><span style="color:var(--accent1)">■</span> Calories &nbsp; <span style="color:var(--accent2)">■</span> Protein</div>
    </div>
    <div class="card span12"><div class="card-hd"><div class="card-title">Eating window</div><div class="card-sub">First & last meal</div></div><div class="chart-wrap h260"><canvas id="cTiming"></canvas></div></div>

  // CALORIE TRENDS (enhanced with distribution + recent vs prior + monthly macro)
  const pc=D.period_compare;
  h+=`<div class="page" id="nu-trends"><div class="grid2">
    <div class="card span12"><div class="card-hd"><div class="card-title">Weekly calorie trend</div><div class="card-sub">Avg kcal / week</div></div><div class="chart-wrap h260"><canvas id="cWeeklyCal"></canvas></div></div>

      <div class="kv-row"><span class="kv-key">Protein / kg body weight</span><span class="kv-val danger">${fmt(A.protein/83,2)} g/kg</span></div>

    </div></div>
    <div class="card span12"><div class="card-hd"><div class="card-title">Monthly macro trend</div><div class="card-sub">Avg g / month</div></div><div class="chart-wrap h240"><canvas id="cMacroTrend"></canvas></div></div>
    <div class="card span12"><div class="card-hd"><div class="card-title">Daily calorie intake</div><div class="card-sub">Color = over/under target</div></div><div class="chart-wrap h260"><canvas id="cCalDaily"></canvas></div></div>
    <div class="card span12"><div class="card-hd"><div class="card-title">Protein trend</div></div><div class="chart-wrap h220"><canvas id="cProtTrend"></canvas></div></div>
  </div></div>`;

  // PATTERNS & BALANCE
  h+=`<div class="page" id="nu-patterns">${patSec('nutrition')}<div class="card" style="margin-top:16px"><div class="card-hd"><div class="card-title">Calories in vs out</div><div class="card-sub">Weekly average</div></div><div class="chart-wrap h300"><canvas id="cBalance"></canvas></div></div></div>`;

  // RECS
  h+=`<div class="page" id="nu-recs"><div class="rec-grid">
    <div class="rec-section-hd">Critical</div>
    <div class="rec-card critical"><div class="rec-badge badge-rose">🚨 Protein — ${Math.round(C.protein/T.protein*100)}% of target</div><div class="rec-title">Hit ${T.protein}g daily — #1 recomp lever · missed every month</div><div class="rec-body">Currently at <span class="hi-rose">${fmt(C.protein,0)}g (${Math.round(C.protein/T.protein*100)}%)</span> — <b>all 8 tracked months</b> from Aug 2025 to Mar 2026 have missed the target. Range: 79–116g. Anchor <b>40g at breakfast and lunch</b>. ${fmt(A.protein/83,1)}g/kg → 1.8g/kg target.</div></div>

    <div class="rec-card important"><div class="rec-badge badge-amber">Weekends</div><div class="rec-title">Saturday within 300 kcal of weekday</div><div class="rec-body"><span class="hi-amber">Meal prep Friday evening</span>. Keep protein high to reduce hunger.</div></div>
    <div class="rec-card advisory"><div class="rec-badge badge-emerald">Fiber</div><div class="rec-title">Bump fiber to 30g</div><div class="rec-body">At ${fmt(A.fiber,0)}g, add legumes or whole grains. Supports satiety and consistency.</div></div>
    <div class="rec-card target wide"><div class="rec-badge badge-cyan">90-day target</div><div class="rec-title">What success looks like</div><div class="checklist">
      <div class="check-item"><span class="icon">🥩</span><span><b>Protein ≥ ${T.protein}g on 5+ days/week</b></span></div>

      <div class="check-item"><span class="icon">📅</span><span><b>Saturday within 300 kcal of weekday</b></span></div>
      <div class="check-item"><span class="icon">🥦</span><span><b>Fiber ≥ 28g/day</b></span></div>
    </div></div></div></div>`;
  return h;
}

  mc('cMuscleStack',{type:'bar',data:{labels:allMonths,datasets:stackDS},options:{responsive:true,maintainAspectRatio:false,scales:{x:{stacked:true},y:{stacked:true,title:{display:true,text:'Volume (kg)'}}}}});

    }
    allEx.forEach(ex=>{
      const b=document.createElement('button');b.className='ex-btn'+(activeEx.has(ex)?' active':'');b.textContent=ex.replace(/ \(.*\)/,'');
      b.onclick=()=>{if(activeEx.has(ex))activeEx.delete(ex);else activeEx.add(ex);b.classList.toggle('active');renderOverload();};
      btnsEl.appendChild(b);
    });
    renderOverload();
  }

  // Exercise volumes
  const ev=D.training_exercise_volumes||[];
  mc('cExVol',{type:'bar',data:{labels:ev.map(e=>e.exercise.replace(/ \(.*\)/,'')),datasets:[{data:ev.map(e=>e.volume),backgroundColor:CC.concat(CC),borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{title:{display:true,text:'Volume (kg)'}}}}});

  // Weekly training heatmap — sessions per week, fill empty weeks explicitly
  const wSess=D.training_weekly_sessions||[];
  const hmEl=document.getElementById('trainHM');
  if(hmEl&&wSess.length){
    // Build a complete set of year-weeks between first and last session
    function isoWeek(dateStr){
      const d=new Date(dateStr+'T12:00:00Z');
      const thu=new Date(d);thu.setUTCDate(d.getUTCDate()+(4-d.getUTCDay()||7)-d.getUTCDay());
      const year=thu.getUTCFullYear();
      const w1=new Date(Date.UTC(year,0,4));
      const week=Math.ceil(((thu-w1)/86400000+1)/7);
      const mo=d.getUTCMonth()+1;
      return{year,week,month:mo};
    }
    const sessLookup={};
    wSess.forEach(w=>{sessLookup[`${w.year}-W${w.week}`]=w;});
    // Expand year range
    const years=[...new Set(wSess.map(w=>w.year))].sort();
    const firstYear=years[0],lastYear=years[years.length-1];
    // Get first and last week numbers per year
    const allSessInYear={};
    wSess.forEach(w=>{if(!allSessInYear[w.year])allSessInYear[w.year]=[];allSessInYear[w.year].push(w.week);});
    // Build expanded week list per year
    const expanded={};
    years.forEach(year=>{
      const existing=allSessInYear[year]||[];
      const minW=Math.min(...existing),maxW=Math.max(...existing);
      const list=[];
      for(let w=minW;w<=maxW;w++){
        const key=`${year}-W${w}`;
        if(sessLookup[key]){list.push(sessLookup[key]);}
        else{
          // Estimate month from week number (approximate)
          const dayOfYear=(w-1)*7+4;
          const d=new Date(year,0,dayOfYear);
          const mo=d.getMonth()+1;
          list.push({year,week:w,month:mo,sessions:0,year_week:key});
        }
      }
      expanded[year]=list;
    });

    const monthNames=['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    let hh='';
    years.forEach(year=>{
      const yearWeeks=expanded[year]||[];
      if(!yearWeeks.length) return;
      hh+=`<div style="margin-bottom:16px"><div style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:8px">${year}</div><div style="display:flex;flex-wrap:wrap;gap:3px;align-items:flex-end">`;
      let lastMonth=0;
      yearWeeks.forEach(w=>{
        if(w.month!==lastMonth){
          if(lastMonth>0)hh+='<div style="width:4px"></div>';
          hh+=`<div style="font-size:9px;color:var(--text3);align-self:flex-end;margin-right:2px">${monthNames[w.month]}</div>`;
          lastMonth=w.month;
        }
        const s=w.sessions;
        const bg=s===0?cv('--zone-empty'):s===1?cfill(cv('--accent1'),0.35):s<=3?cfill(cv('--accent5'),0.5):'var(--accent5)';
        const border=s===0?'var(--border)':s===1?cfill(cv('--accent1'),0.5):s<=3?cfill(cv('--accent5'),0.7):cv('--accent5-bright');
        hh+=`<div title="W${w.week} ${year}: ${s} session${s!==1?'s':''}" style="width:16px;height:16px;border-radius:3px;background:${bg};border:1px solid ${border}"></div>`;
      });
      hh+='</div></div>';
    });
    hh+=`<div class="cal-legend">
      <div class="cal-legend-item"><div class="cal-dot" style="background:rgba(255,255,255,0.04);border:1px solid var(--border)"></div>0 sessions</div>
      <div class="cal-legend-item"><div class="cal-dot" style="background:hsla(210,80%,65%,0.35);border:1px solid hsla(210,80%,65%,0.5)"></div>1 session</div>
      <div class="cal-legend-item"><div class="cal-dot" style="background:hsla(158,100%,40%,0.5);border:1px solid hsla(158,100%,40%,0.7)"></div>2–3 sessions</div>
      <div class="cal-legend-item"><div class="cal-dot" style="background:var(--accent5);border:1px solid #5BEDB3"></div>4+ sessions</div>
    </div>`;
    hmEl.innerHTML=hh;
  }
}

// ═══ HEATMAP (FIXED - proper date matching) ═══
function buildHM(id,data,valFn,levels,startDate){
  const el=document.getElementById(id);if(!el)return;
  const dateMap={};
  data.forEach(d=>{
    const v=valFn(d);
    if(v!=null&&!isNaN(v)){
      const dateKey=typeof d.date==='string'?d.date.substring(0,10):d.date;
      dateMap[dateKey]=v;
    }
  });
  const start=new Date(startDate||'2025-01-01'),end=new Date('2026-03-28');
  const dn=['M','T','W','T','F','S','S'];
  let h='<div style="display:flex;gap:10px;align-items:flex-start;overflow-x:auto;padding:8px"><div style="display:flex;flex-direction:column;gap:2px;padding-top:18px">';
  dn.forEach(d=>h+=`<div style="font-size:9px;color:var(--text3);text-align:right;height:11px;line-height:11px;padding-right:4px">${d}</div>`);
  h+='</div><div style="display:flex;gap:2px">';
  let cur=new Date(start);while(cur.getDay()!==1)cur.setDate(cur.getDate()-1);
  while(cur<=end){
    h+='<div style="display:flex;flex-direction:column;gap:2px">';
    h+=cur.getDate()<=7?`<div style="font-size:9px;color:var(--text3);height:14px;white-space:nowrap">${cur.toLocaleDateString('en',{month:'short'})}</div>`:'<div style="height:14px"></div>';
    for(let dow=0;dow<7;dow++){
      const ds=cur.toISOString().split('T')[0];
      const v=dateMap[ds];
      let bg=levels[0].bg,border=levels[0].border;
      if(v!=null&&!isNaN(v)){
        if(levels.length===2){
          bg=v>0?levels[1].bg:levels[0].bg;border=v>0?levels[1].border:levels[0].border;
        } else {
          for(let i=1;i<levels.length;i++){
            if(v<=levels[i].max){bg=levels[i].bg;border=levels[i].border;break;}
            if(i===levels.length-1){bg=levels[i].bg;border=levels[i].border;}
          }
        }
      }
      h+=`<div class="heat-cell" title="${ds}: ${v!=null?typeof v==='number'?v.toFixed(1):'—':'No data'}" style="background:${bg};border:1px solid ${border}"></div>`;
      cur.setDate(cur.getDate()+1);
    }
    h+='</div>';
  }
  h+='</div></div><div class="cal-legend">';
  levels.forEach(l=>h+=`<div class="cal-legend-item"><div class="cal-dot" style="background:${l.bg};border:1px solid ${l.border}"></div>${l.label}</div>`);
  h+='</div>';el.innerHTML=h;
}
