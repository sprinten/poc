    <div class="stat-cell"><div class="stat-lbl">Avg PWV</div><div class="stat-val">${fmt(avgPwv,2)}<span class="u">m/s</span></div>${pwvDelta>0.1?tElRaw('▲ creeping up — monitor','dn'):tElRaw('▼ stable trend','up')}<div class="stat-sub">${pwv.length} readings · &lt;7.6 = healthy</div><div class="stat-bar" style="background:${avgPwv>=7.0?'var(--accent3)':'var(--accent5)'}"></div></div>
    <div class="stat-cell"><div class="stat-lbl">Blood Pressure</div><div class="stat-val">${avgSys?Math.round(avgSys):'—'}<span class="u">/${avgDia?Math.round(avgDia):'—'}</span></div>${avgSys&&avgSys>=130?tElRaw('▲ elevated systolic','dn'):tElRaw('▼ normal range','up')}<div class="stat-sub">avg · ${bp.length} readings</div><div class="stat-bar" style="background:${avgSys&&avgSys>=130?'var(--accent2)':'var(--accent6)'}"></div></div>
    <div class="stat-cell"><div class="stat-lbl">Sleep HR Avg</div><div class="stat-val">${fmt(avgSleepHR,0)}<span class="u">bpm</span></div>${avgSleepHR<55?tElRaw('▼ strong fitness signal','up'):tElRaw('▲ check sleep quality','nt')}<div class="stat-sub">Withings · ${sl.filter(d=>d.sleep_hr_avg>0).length} nights</div><div class="stat-bar" style="background:var(--accent2)"></div></div>
    <div class="stat-cell"><div class="stat-lbl">HRV</div><div class="stat-val" style="font-size:20px">—</div>${tElRaw('→ not tracked yet','nt')}<div class="stat-sub">not tracked yet</div><div class="stat-bar" style="background:var(--text3)"></div></div>
    <div class="stat-cell"><div class="stat-lbl">SpO₂</div><div class="stat-val" style="font-size:20px">—</div>${tElRaw('→ sleep data available','info')}<div class="stat-sub">sleep data via Health Connect</div><div class="stat-bar" style="background:var(--accent1)"></div></div>
    <div class="stat-cell"><div class="stat-lbl">Body Temp</div><div class="stat-val" style="font-size:20px">—</div>${tElRaw('→ not tracked','nt')}<div class="stat-sub">not tracked</div><div class="stat-bar" style="background:var(--text3)"></div></div>
  </div>`;

  // ── OVERVIEW ──
  h += `<div id="vt-overview" class="page active">`;

  const ovInsights = [
    {emoji:'🫀', title:`PWV ${fmt(avgPwv,2)} m/s — within healthy range`, text:`${pwv.length} readings since Nov 2025. Average ${fmt(avgPwv,2)} m/s, healthy threshold is &lt;7.6 m/s. Recent trend ${pwvDelta>0.1?'<span class="hi-amber">slightly upward — monitor</span>':'<span class="hi-emerald">stable</span>'}. ${pwv.filter(d=>d.pwv>=7.0).length} readings reached 7.0+; late Jan–Feb 2026 was the highest cluster.`, severity:avgPwv>=7.0?'warn':'good'},
    {emoji:'🩸', title:`Blood pressure: latest ${latBp.systolic||'—'}/${latBp.diastolic||'—'} mmHg`, text:`${bp.length} readings since Nov 2025. Jan 2026 recorded 138/67 mmHg (elevated systolic). Average <b>${avgSys?fmt(avgSys,0):'—'}/${avgDia?fmt(avgDia,0):'—'} mmHg</b> — borderline Stage 1. Needs consistent monthly monitoring and follow-up if pattern persists.`, severity:latBp.systolic>=130?'warn':'info'},
    {emoji:'❤️', title:`Nocturnal HR avg ${fmt(avgSleepHR,0)} bpm — healthy signal`, text:`Average sleep heart rate of <b>${fmt(avgSleepHR,0)} bpm</b> across ${sl.filter(d=>d.sleep_hr_avg>0).length} Withings nights. Low-to-mid 40s on good nights = strong cardiovascular fitness. Higher readings (55–70 bpm) correlate directly with fragmented sleep nights.`, severity:'good'},
    {emoji:'💓', title:`HRV not tracked — high-value gap`, text:`Heart Rate Variability is the most sensitive daily recovery signal available without blood tests. Not currently captured by your devices. Adding HRV (Withings ScanWatch / Body Cardio) would unlock readiness scoring, stress detection, and training load guidance.`, severity:'info'},
    {emoji:'🫁', title:`SpO₂ measured passively during sleep`, text:`Oxygen saturation is captured nightly via Health Connect. Healthy range is 95–100%. Readings below 90% warrant attention. Data is available in Google Fit — add it to the Trends view in a future update.`, severity:'info'},
    {emoji:'🌡️', title:`Body temperature not tracked`, text:`Continuous or morning temperature tracking (Withings Thermo or ring device) can detect illness onset, ovulation cycles, and metabolic changes. Not currently captured in this dataset.`, severity:'info'}
  ];
  h += insG(ovInsights);
  h += `</div>`;

  // ── TRENDS ──
  h += `<div id="vt-trends" class="page">`;
  h += `<div class="card span12"><div class="card-hd"><div class="card-title">Pulse Wave Velocity Trend</div><div class="card-sub">Nov 2025 → Mar 2026 · ${pwv.length} readings · healthy &lt;7.6 m/s · monitor ≥7.0 m/s</div></div><div class="chart-wrap h280"><canvas id="cVtPwv"></canvas></div></div>`;
  h += `<div class="grid2">
    <div class="card span6"><div class="card-hd"><div class="card-title">Blood Pressure</div><div class="card-sub">${bp.length} readings · red = systolic ≥ 130 mmHg</div></div><div class="chart-wrap h260"><canvas id="cVtBP"></canvas></div></div>
    <div class="card span6"><div class="card-hd"><div class="card-title">Sleep Heart Rate</div><div class="card-sub">Avg HR during sleep · Withings · ${sl.filter(d=>d.sleep_hr_avg>0).length} nights</div></div><div class="chart-wrap h260"><canvas id="cVtSleepHR"></canvas></div></div>
  </div>`;
  // SpO2 + HRV info panels
  h += `<div class="grid2">
    <div class="card span6"><div class="card-hd"><div class="card-title">🫁 Oxygen Saturation (SpO₂)</div><div class="card-sub">Via Health Connect during sleep</div></div>
      <div style="padding:16px 20px">
        <div style="font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:14px">SpO₂ is measured passively during sleep via Health Connect. Values of <b>95–100%</b> are normal; below 90% warrants medical attention. Time-series charts will be added when the data pipeline is connected.</div>
        <div style="display:flex;gap:12px;flex-wrap:wrap">
          <div style="flex:1;min-width:110px;padding:12px;background:var(--surface);border-radius:8px;border-left:3px solid var(--accent5)"><div style="font-size:10px;color:var(--text3);margin-bottom:4px">Healthy range</div><div style="font-size:20px;font-weight:700;color:var(--accent5)">95–100%</div></div>
          <div style="flex:1;min-width:110px;padding:12px;background:var(--surface);border-radius:8px;border-left:3px solid var(--accent3)"><div style="font-size:10px;color:var(--text3);margin-bottom:4px">Alert threshold</div><div style="font-size:20px;font-weight:700;color:var(--accent3)">&lt;90%</div><div style="font-size:10px;color:var(--text3)">seek medical advice</div></div>
          <div style="flex:1;min-width:110px;padding:12px;background:var(--surface);border-radius:8px;border-left:3px solid var(--accent6)"><div style="font-size:10px;color:var(--text3);margin-bottom:4px">Data source</div><div style="font-size:15px;font-weight:600;color:var(--text2)">Google Fit</div><div style="font-size:10px;color:var(--text3)">Health Connect nightly</div></div>
        </div>
      </div>
    </div>
    <div class="card span6"><div class="card-hd"><div class="card-title">💓 Heart Rate Variability (HRV)</div><div class="card-sub">Not currently tracked</div></div>
      <div style="padding:16px 20px">
        <div style="font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:12px">HRV (RMSSD) is the most sensitive recovery marker available without blood tests. It's not currently captured by your devices.</div>
        <div style="padding:12px;background:var(--surface);border-radius:8px;border-left:3px solid var(--accent4);margin-bottom:12px">
          <div style="font-size:11px;font-weight:600;color:var(--accent4);margin-bottom:6px">Why HRV matters</div>
          <div style="font-size:12px;color:var(--text2);line-height:1.6">Higher HRV = better recovery and stress resilience. Active adults typically see 50–80ms RMSSD. HRV drops sharply after poor sleep, alcohol, or high training load — making it an ideal daily readiness signal.</div>
        </div>
        <div style="padding:10px 12px;background:var(--surface);border-radius:8px;font-size:12px;color:var(--text3)">📌 Enable on Withings ScanWatch or Body Cardio. Alternatively use a chest strap (Polar H10) with an HRV app during sleep.</div>
      </div>
    </div>
  </div>`;
  const trendInsights = [
    {emoji:'📈', title:`PWV creeping up — still healthy but bears watching`, text:`${pwv.filter(d=>d.pwv>=7.0).length} of ${pwv.length} readings (${Math.round(pwv.filter(d=>d.pwv>=7.0).length/pwv.length*100)}%) reached 7.0 m/s or above. Jan–Feb 2026 cluster reached 7.1–7.2 m/s — the highest sustained period. Aerobic exercise is the most evidence-based lever to reduce arterial stiffness.`, severity:avgPwv>=7.0?'warn':'info'},
    {emoji:'🩸', title:`BP: one confirmed elevated reading (138/67, Jan 2026)`, text:`All other readings fall within normal Stage 1 range (102–121 systolic). The single elevated reading could be situational (stress, high sodium, measurement error). With only ${bp.length} readings over 3 months, the dataset is too sparse for definitive trend analysis.`, severity:'warn'},
    {emoji:'❤️', title:`Sleep HR reflects training and sleep quality well`, text:`Lowest readings (44–48 bpm) coincide with good sleep nights — a sign of strong cardiovascular fitness and parasympathetic activation. Readings above 60 bpm correlate with interrupted sleep, which is visible in the Withings sleep stage data.`, severity:'good'}
  ];
  h += insG(trendInsights);
  h += `</div>`;

  // ── RECOMMENDATIONS ──
  h += `<div id="vt-recs" class="page">`;
  h += `<div class="section-hd" style="margin-top:0">Arterial Health</div><div class="rec-grid">
    <div class="rec-section-hd">Monitor Closely</div>
    <div class="rec-card critical"><div class="rec-badge badge-amber">PWV</div><div class="rec-title">Keep PWV below 7.0 m/s with aerobic exercise</div><div class="rec-body">Your current avg of ${fmt(avgPwv,2)} m/s is safe (&lt;7.6) but trending higher in Jan–Feb. <b>150 min/week moderate cardio is the strongest modifiable factor</b> for reducing arterial stiffness. Your tennis and walking habit is already doing this — protect it. Even 20 min of brisk walking 5×/week measurably improves arterial compliance over 3–6 months.</div></div>
    <div class="rec-card critical"><div class="rec-badge badge-rose">Blood Pressure</div><div class="rec-title">Monthly home BP measurement — one elevated reading flagged</div><div class="rec-body">The Jan 2026 reading of 138/67 mmHg is Stage 2 elevated systolic. Could be situational, but needs follow-up. <b>Protocol: 3 readings, 1 min apart, seated after 5 min rest, same arm.</b> If 3+ readings show &gt;130 systolic on separate days, discuss with a doctor. Sodium intake also has a 3–5 day effect on BP — track together.</div></div>
  </div>`;
  h += `<div class="section-hd">Tracking Gaps to Close</div><div class="rec-grid">
    <div class="rec-section-hd">High Impact</div>
    <div class="rec-card important"><div class="rec-badge badge-violet">HRV</div><div class="rec-title">Add HRV tracking — unlocks daily readiness scoring</div><div class="rec-body">Enable on Withings (ScanWatch / Body Cardio) or use a chest strap (Polar H10) with an HRV app. A 4-week baseline establishes your personal range. Use HRV to guide training intensity: on low-HRV days, reduce volume or skip HIIT. Target RMSSD &gt;50ms for an active adult your age.</div></div>
    <div class="rec-card important"><div class="rec-badge badge-cyan">SpO₂</div><div class="rec-title">Review SpO₂ trend for sleep-disordered breathing signals</div><div class="rec-body">SpO₂ data is captured nightly via Health Connect but not yet visualized here. Check Google Fit for your readings. Consistent values below 94% during sleep may indicate sleep apnea or upper airway obstruction — especially relevant given your deep sleep decline to 13%. If SpO₂ dips below 90% regularly, consult a doctor.</div></div>
  </div>`;
  h += `<div class="section-hd">90-Day Vitals Targets</div><div class="rec-grid">
    <div class="rec-card advisory wide"><div class="rec-badge badge-cyan">Goals</div><div class="rec-title">Vitals targets — next 3 months</div><div class="checklist">
      <div class="check-item"><span class="icon">🫀</span><span><b>PWV ≤ 6.8 m/s avg</b> — protect with 150 min/week aerobic activity minimum</span></div>
      <div class="check-item"><span class="icon">🩸</span><span><b>BP consistently &lt; 125/80 mmHg</b> — monthly home measurements, 3 readings each time</span></div>
      <div class="check-item"><span class="icon">💓</span><span><b>Set up HRV tracking</b> — establish 4-week baseline, target RMSSD &gt;50ms</span></div>
      <div class="check-item"><span class="icon">🫁</span><span><b>Review SpO₂ data in Google Fit</b> — confirm nightly readings &gt;94%</span></div>
      <div class="check-item"><span class="icon">❤️</span><span><b>Maintain sleep HR &lt;55 bpm avg</b> — proxy for cardiovascular fitness and sleep quality</span></div>
    </div></div>
  </div>`;
  h += `</div>`;
  return h;
}

// ═══ MEASUREMENTS ═══
function rMeasurements(){
  const W=D.weight_composition||[];
  const E=D.eufy_monthly||[];
  const latW = W.filter(d=>d.muscle_mass_kg).slice(-1)[0] || W.slice(-1)[0] || {};
  const latEufy = E.slice(-1)[0]||{};
  const firstEufy = E[0]||{};
  const bmi = D.current.weight / (1.82*1.82);

  let h = `<div class="tab-bar">
    <div class="tab active" onclick="showSub('ms','overview',this)">Overview</div>
    <div class="tab" onclick="showSub('ms','trends',this)">Trends</div>
    <div class="tab" onclick="showSub('ms','recs',this)">Recommendations ✦</div>
  </div>`;

  // Weight 30-day trend
  const msWArr=(D.weight_composition||[]).filter(d=>d.weight_kg).sort((a,b)=>a.date<b.date?-1:1);
  const msd30=new Date(Date.now()-30*86400000).toISOString().slice(0,10);
  const msW30=msWArr.filter(d=>d.date<=msd30).slice(-1)[0];
  const msWTr=msW30?+(D.current.weight-msW30.weight_kg).toFixed(1):null;
  const msBFTr=(msW30&&msW30.body_fat_pct)?+(D.current.body_fat-msW30.body_fat_pct).toFixed(1):null;
  const msMMTr=(msW30&&msW30.muscle_mass_kg)?+(D.current.muscle_mass-msW30.muscle_mass_kg).toFixed(1):null;

  h += `<div class="stat-strip">
    <div class="stat-cell"><div class="stat-lbl">Weight</div><div class="stat-val">${fmt(D.current.weight,1)}<span class="u">kg</span></div>${msWTr!==null?tEl(msWTr,true,' kg'):tElRaw('↓ trending down','up')}<div class="stat-sub"><span class="hi-emerald">↓ ${fmt(D.eufy_peak.weight-D.current.weight,1)} kg</span> from peak (Jul '23)</div><div class="stat-bar" style="background:var(--accent1)"></div></div>
    <div class="stat-cell"><div class="stat-lbl">BMI</div><div class="stat-val">${fmt(bmi,1)}</div>${bmi<25?tElRaw('▼ normal weight','up'):tEl(+(bmi-25).toFixed(1),true,' above 25.0')}<div class="stat-sub">${bmi<25?'Normal weight':'Overweight'} · h = 182 cm</div><div class="stat-bar" style="background:${bmi<25?'var(--accent5)':'var(--accent3)'}"></div></div>
    <div class="stat-cell"><div class="stat-lbl">Body Fat %</div><div class="stat-val">${fmt(D.current.body_fat,1)}<span class="u">%</span></div>${msBFTr!==null?tEl(msBFTr,true,'%','30d'):tElRaw('↓ declining','up')}<div class="stat-sub">Withings · was 31.4% Aug 2025</div><div class="stat-bar" style="background:var(--accent4)"></div></div>
    <div class="stat-cell"><div class="stat-lbl">Muscle Mass</div><div class="stat-val">${fmt(latW.muscle_mass_kg||D.current.muscle_mass,1)}<span class="u">kg</span></div>${msMMTr!==null?tEl(msMMTr,false,' kg','30d'):tElRaw('→ preserved','up')}<div class="stat-sub">Withings BIA</div><div class="stat-bar" style="background:var(--accent5)"></div></div>
    <div class="stat-cell"><div class="stat-lbl">Visceral Fat</div><div class="stat-val">12<span class="u">units</span></div>${tElRaw('▼ −43% from peak','up')}<div class="stat-sub">was 21 (Jul 2022) ↓ 43%</div><div class="stat-bar" style="background:var(--accent3)"></div></div>
    <div class="stat-cell"><div class="stat-lbl">BMR (Eufy)</div><div class="stat-val">${fmt(latEufy.bmr||1588,0)}<span class="u">kcal</span></div>${tEl(+(( latEufy.bmr||1588)-(firstEufy.bmr||1755)).toFixed(0),true,' kcal','from start')}<div class="stat-sub">was ${fmt(firstEufy.bmr||1755,0)} (Jul 2022)</div><div class="stat-bar" style="background:var(--accent2)"></div></div>
  </div>`;

  // ── OVERVIEW ──
  h += `<div id="ms-overview" class="page active">`;

  // Goal progress bars
  h += `<div class="grid2" style="margin-top:4px">
    <div class="card span5"><div class="card-hd"><div class="card-title">Goal Progress</div><div class="card-sub">From start → target</div></div>
      <div style="padding:4px 4px 8px">
        ${pBar('Weight',D.current.weight,D.start.weight,D.targets.weight_goal,'var(--accent1)',' kg')}
        ${pBar('Body Fat %',D.current.body_fat,D.start.body_fat,18,'var(--accent4)','%')}
        ${pBar('Muscle Mass',D.current.muscle_mass,D.start.muscle_mass||63.7,65,'var(--accent5)',' kg')}
      </div>
    </div>
    <div class="card span7"><div class="card-hd"><div class="card-title">Recent Weight Trend (Withings)</div><div class="card-sub">Aug 2025 → now · daily readings</div></div><div class="chart-wrap h220"><canvas id="cMsWeightMini"></canvas></div></div>
  </div>`;

  const ovInsights = [
    {emoji:'📉', title:`3-year journey: 95.7 → ${fmt(D.current.weight,1)} kg (−${fmt(D.eufy_peak.weight-D.current.weight,1)} kg)`, text:`Peak at 95.7 kg (Jul 2023). Currently ${fmt(D.current.weight,1)} kg — <b>${fmt(D.current.weight-D.targets.weight_goal,1)} kg from the ${D.targets.weight_goal} kg goal</b>. The trend is consistently down over 3 years across two different scales.`, severity:'good'},
    {emoji:'💪', title:`Body composition recomp working`, text:`Withings body fat dropped from 31.4% (Aug 2025) to ${fmt(D.current.body_fat,1)}% — while muscle mass stayed at ${fmt(latW.muscle_mass_kg||D.current.muscle_mass,1)} kg. This is the hallmark of successful body recomposition: losing fat, preserving muscle.`, severity:'good'},
    {emoji:'🏋️', title:`Visceral fat: 21 → 12 units (−43%) — strongest metabolic signal`, text:`Visceral fat has nearly halved since Jul 2022. Values ≤13 units indicate low metabolic risk. This improvement is more clinically meaningful than total scale weight — it reflects genuine cardiometabolic health improvement.`, severity:'good'},
    {emoji:'⚡', title:`BMI now ${fmt(bmi,1)} — approaching normal weight threshold`, text:`BMI dropped from ~28.9 (peak, Jul 2023) to ${fmt(bmi,1)} now. The &lt;25 threshold is at ${fmt(D.targets.weight_goal,0)} kg — which aligns exactly with your 81 kg goal. Reaching the goal achieves both BMI normal range and target weight simultaneously.`, severity:bmi<25?'good':'info'},
    {emoji:'🔥', title:`BMR declined naturally with weight loss — protect it`, text:`BMR dropped from ~${fmt(firstEufy.bmr||1755,0)} to ~${fmt(latEufy.bmr||1588,0)} kcal — a natural adaptation. <b>Resistance training 3×/week is the primary tool</b> to prevent further BMR decline. Cutting calories too aggressively without training accelerates this metabolic adaptation.`, severity:'info'},
    {emoji:'⚖️', title:`Two scales, two readings — use trends not absolutes`, text:`Eufy reads ~24.5% body fat (Dec 2025); Withings reads ~20% for the same period. Both use different BIA algorithms. Both agree on direction: body fat is declining. Trust the trend over any single reading.`, severity:'info'}
  ];
  h += insG(ovInsights);
  h += `</div>`;

  // ── TRENDS ──
  h += `<div id="ms-trends" class="page">`;
  h += `<div class="card span12"><div class="card-hd"><div class="card-title">Weight Journey — Jul 2022 → Present</div><div class="card-sub">Eufy monthly · Withings daily · Body Fat % · Visceral Fat (3-year view)</div></div><div class="chart-wrap h300"><canvas id="cMsWeightJourney"></canvas></div></div>`;
  h += `<div class="grid2">
    <div class="card span6"><div class="card-hd"><div class="card-title">Body Composition (Withings)</div><div class="card-sub">Fat mass · Muscle mass · Bone mass · Nov 2025 → Mar 2026</div></div><div class="chart-wrap h260"><canvas id="cMsBodyComp"></canvas></div></div>
    <div class="card span6"><div class="card-hd"><div class="card-title">Eufy: Muscle Mass & Body Fat %</div><div class="card-sub">Jul 2022 → Dec 2025 · monthly averages</div></div><div class="chart-wrap h260"><canvas id="cMsEufyMuscle"></canvas></div></div>
  </div>`;
  const trendInsights = [
    {emoji:'📉', title:`Weight loss phase: from 92.9 kg (Jul 2022) to peak 95.7 kg (Jul 2023), then sustained decline`, text:`The first year showed a slight gain — likely from increased muscle mass and dietary changes. Since the Jul 2023 peak, a consistent 33-month downward trend has produced ${fmt(D.eufy_peak.weight-D.current.weight,1)} kg of net loss.`, severity:'good'},
    {emoji:'💪', title:`Muscle mass preserved throughout the entire 3-year recomp`, text:`Eufy shows muscle mass from ~60 kg (Jul 2022) to ~59 kg (Dec 2025) — essentially flat, confirming muscle was preserved during fat loss. Withings reads higher (63–65 kg range) due to different BIA calibration.`, severity:'good'},
    {emoji:'📊', title:`Body fat: Withings shows faster recent progress (Aug–Mar)`, text:`Withings body fat dropped 11+ percentage points in 7 months (31.4% → ~20%). This rapid change reflects both actual fat loss and the calibration difference from the previous Eufy readings. The Eufy data (24.5% in Dec 2025) provides a useful reality check.`, severity:'info'}
  ];
  h += insG(trendInsights);
  h += `</div>`;

  // ── RECOMMENDATIONS ──
  h += `<div id="ms-recs" class="page">`;
  h += `<div class="section-hd" style="margin-top:0">Weight & Body Composition</div><div class="rec-grid">
    <div class="rec-section-hd">Priority Actions</div>
    <div class="rec-card critical"><div class="rec-badge badge-cyan">Weight</div><div class="rec-title">Close the final ${fmt(D.current.weight-D.targets.weight_goal,1)} kg: structured weekly deficit</div><div class="rec-body">At ${fmt(D.current.weight,1)} kg, you're ${fmt(D.current.weight-D.targets.weight_goal,1)} kg from goal. A <b>250–300 kcal/day deficit</b> yields ~0.25 kg/week — reaching ${D.targets.weight_goal} kg in ~${Math.ceil((D.current.weight-D.targets.weight_goal)/0.25)} weeks without sacrificing muscle. Don't cut deeper: protein below 140g/day increases catabolism risk at a deficit.</div></div>
    <div class="rec-card critical"><div class="rec-badge badge-violet">Body Fat</div><div class="rec-title">Protein ≥ 150g/day to protect recomp</div><div class="rec-body">Current avg of ~${fmt(D.current.protein||93,0)}g protein is too low for active fat loss. During a caloric deficit, muscle is catabolized first without sufficient protein. <b>Anchor 40g at breakfast and lunch</b> (Greek yogurt, eggs, or whey shake) to hit 150g minimum — especially on rest days.</div></div>
    <div class="rec-section-hd" style="margin-top:8px">Important</div>
    <div class="rec-card important"><div class="rec-badge badge-amber">Recomp</div><div class="rec-title">Maintain resistance training — BMR protection</div><div class="rec-body">BMR has already dropped from ~${fmt(firstEufy.bmr||1755,0)} to ~${fmt(latEufy.bmr||1588,0)} kcal — natural with weight loss. Consistent resistance training (3×/week) preserves lean mass and keeps BMR from falling further. Don't cut training volume while reducing calories — this is the most common recomp mistake.</div></div>

function glProg(g){
  if(g.lb===null){const pct=Math.max(0,1-Math.abs(g.current-g.target)/(Math.abs(g.target-g.start)||1));return{pct:pct*100,achieved:Math.abs(g.current-g.target)/g.target<0.05};}
  const range=g.lb?(g.start-g.target):(g.target-g.start);
  const done=g.lb?(g.start-g.current):(g.current-g.start);
  const pct=range>0?Math.min(100,Math.max(0,done/range*100)):0;
  return{pct,achieved:g.lb?g.current<=g.target:g.current>=g.target};
}

function glStat(g){
  const{pct,achieved}=glProg(g);
  if(achieved)return{label:'✓ Achieved',color:'var(--accent5)'};
  if(pct>=65)return{label:'On track',color:'var(--accent5)'};
  if(pct>=25)return{label:'Progressing',color:'var(--accent3)'};
  return{label:'Behind',color:'var(--accent2)'};
}

function glFmtVal(g,v){
  if(g.ffn)return g.ffn(v);
  if(g.unit===' kcal')return fmtC(Math.round(v))+g.unit;
  if(g.unit==='')return fmtC(Math.round(v));
  return fmt(v,1)+g.unit;
}

function glItem(g){
  const{pct}=glProg(g);const stat=glStat(g);
  return `<div class="gl-goal-item">
    <div class="gl-goal-meta">
      <span class="gl-goal-name">${g.name}</span>
      <span class="gl-goal-status" style="color:${stat.color}">${stat.label}</span>
      <span class="gl-goal-current">${glFmtVal(g,g.current)}</span>
    </div>
    <div class="gl-progress-track"><div class="gl-progress-fill" style="width:${pct}%;background:${stat.color}"></div></div>
    <div class="gl-progress-foot">
      <span>Start: ${glFmtVal(g,g.start)}</span>
      <span>${Math.round(pct)}% complete</span>
      <span>Target: ${glFmtVal(g,g.target)}</span>
    </div>
  </div>`;}

function glDomCard(icon,title,goals){
  const ok=goals.filter(g=>['✓ Achieved','On track'].includes(glStat(g).label)).length;
  const behind=goals.filter(g=>glStat(g).label==='Behind').length;
  const col=ok===goals.length?'var(--accent5)':behind>0?'var(--accent2)':'var(--accent3)';
  return `<div class="gl-domain-card">
    <div class="gl-domain-hd">
      <span class="gl-domain-title">${icon} ${title}</span>
      <span class="gl-domain-badge" style="background:${col}22;color:${col};border:1px solid ${col}44">${ok}/${goals.length} on track</span>
    </div>
    ${goals.map(glItem).join('')}
  </div>`;}

let _inChart=null;

function insScores(){
  const sleepS=Math.min(100,Math.round((GS.avg/7)*55+(GS.pct_gte7/100)*45));
  const actS=Math.min(100,Math.round(Math.min(C.steps/T.steps,1)*85+15));
  const protS=Math.min(60,Math.round((A.protein/T.protein)*60));
  const calDev=Math.abs(A.calories-T.calories)/T.calories;
  const calS=Math.round(Math.max(0,40*(1-calDev*3)));
  const nutS=Math.min(100,protS+calS);
  const cutoff=new Date(Date.now()-84*86400000).toISOString().slice(0,10);
  const recent=(D.training_sessions||[]).filter(s=>(s.date||'')>=cutoff).length;
  const trainS=Math.min(100,Math.round(Math.min(recent/12/3,1)*65+35));
  const wDrop=D.eufy_peak.weight-C.weight,wRange=D.eufy_peak.weight-T.weight_goal;
  const bfDrop=32.5-C.body_fat,bfRange=32.5-18;
  const vitalS=Math.round(Math.min(1,wDrop/(wRange||1))*35+Math.min(1,bfDrop/(bfRange||1))*35+(C.pwv<7.6?30:10));
  const sc={optimal:100,good:75,fair:50,out:25};
  const bwVals=CATS.flatMap(cat=>cat.markers).map(m=>{const lp=bwLatest(m);return lp?sc[bwZoneFor(lp.v,m.zones)]:null;}).filter(s=>s!==null);
  const bioS=bwVals.length?Math.round(bwVals.reduce((a,b)=>a+b,0)/bwVals.length):68;
  const composite=Math.round((sleepS+actS+nutS+trainS+vitalS+bioS)/6);
  return{sleep:sleepS,activity:actS,nutrition:nutS,training:trainS,vitals:vitalS,biomarkers:bioS,composite};
}

/* ── Helpers ── */
let _bwUid=0;
function bwZoneFor(v,zones){if(v===null||v===undefined)return 'unknown';for(const z of zones){if(v>=z.m&&v<z.x)return z.c;}const last=zones[zones.length-1];return v>=last.x?last.c:'unknown';}
function bwZoneColor(z){return{optimal:ZC.optimal,good:ZC.good,fair:ZC.fair,out:ZC.out,none:'hsl(215,16%,40%)',unknown:'hsl(215,16%,40%)'}[z]||ZC.none;}
function bwZoneLabel(z){return{optimal:'Optimal',good:'Good',fair:'Borderline',out:'Out of range',none:'—',unknown:'N/A'}[z]||'—';}
function bwLatest(m){const pts=m.vals.filter(p=>p.v!==null);return pts.length?pts[pts.length-1]:null;}
function bwPrev(m){const pts=m.vals.filter(p=>p.v!==null);return pts.length>=2?pts[pts.length-2]:null;}
function bwFmtV(v){if(v===null||v===undefined)return '—';if(v>=100)return v.toFixed(v%1===0?0:1);if(v>=10)return v.toFixed(1);return v.toFixed(2);}
function bwCatScore(cat){const sc={optimal:100,good:75,fair:50,out:25,none:null,unknown:null};const vals=cat.markers.map(m=>{const lp=bwLatest(m);return lp?sc[bwZoneFor(lp.v,m.zones)]:null;}).filter(s=>s!==null);return vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length):0;}
function bwScoreLabel(s){if(s>=80)return 'Optimal';if(s>=60)return 'Good';if(s>=35)return 'Borderline';return 'Out of range';}
function bwScoreZone(s){if(s>=80)return 'optimal';if(s>=60)return 'good';if(s>=35)return 'fair';return 'out';}
function bwCatCounts(cat){const c={optimal:0,good:0,fair:0,out:0};cat.markers.forEach(m=>{const lp=bwLatest(m);if(!lp)return;const z=bwZoneFor(lp.v,m.zones);if(c[z]!==undefined)c[z]++;});return c;}

/* ── Score gauge SVG ── */
function bwGaugeSVG(score){
  const cx=100,cy=105,R=78,SW=14;
  const toRad=a=>a*Math.PI/180;
  const arcPt=a=>({x:+(cx+R*Math.cos(toRad(a))).toFixed(2),y:+(cy-R*Math.sin(toRad(a))).toFixed(2)});
  const bgPath=`M ${cx-R} ${cy} A ${R} ${R} 0 0 1 ${cx+R} ${cy}`;
  const sa=180-(score/100)*180;
  const ep=arcPt(sa);
  const span=180-sa;
  let prog='';
  if(score>0&&score<100){prog=`M ${cx-R} ${cy} A ${R} ${R} 0 ${span>=180?1:0} 1 ${ep.x} ${ep.y}`;}
  else if(score>=100){prog=bgPath;}
  const sz=bwScoreZone(score);
  const col=bwZoneColor(sz);
  const ticks=[135,90,45].map(a=>{const ir=R-SW/2-2,or=R+SW/2+2;const ix=(cx+ir*Math.cos(toRad(a))).toFixed(2),iy=(cy-ir*Math.sin(toRad(a))).toFixed(2),ox=(cx+or*Math.cos(toRad(a))).toFixed(2),oy=(cy-or*Math.sin(toRad(a))).toFixed(2);return `<line x1="${ix}" y1="${iy}" x2="${ox}" y2="${oy}" stroke="hsl(217,24%,17%)" stroke-width="1.5"/>`;}).join('');
  const nR=R*0.72,nA=toRad(sa),nX=(cx+nR*Math.cos(nA)).toFixed(2),nY=(cy-nR*Math.sin(nA)).toFixed(2);
  return `<svg viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg">
    <path d="${bgPath}" fill="none" stroke="hsl(215,25%,28%)" stroke-width="${SW}" stroke-linecap="round"/>
    ${prog?`<path d="${prog}" fill="none" stroke="${col}" stroke-width="${SW}" stroke-linecap="round" opacity="0.9"/>`:''}
    ${ticks}
    <line x1="${cx}" y1="${cy}" x2="${nX}" y2="${nY}" stroke="hsl(0,0%,90%)" stroke-width="2" stroke-linecap="round"/>
    <circle cx="${cx}" cy="${cy}" r="7" fill="${col}" opacity="0.3"/>
    <circle cx="${cx}" cy="${cy}" r="5" fill="${col}"/>
    <circle cx="${cx}" cy="${cy}" r="2.5" fill="hsl(215,25%,20%)"/>
    <text x="${cx}" y="${cy+22}" text-anchor="middle" font-family="Noto Sans Mono,monospace" font-size="26" font-weight="700" fill="${col}">${score}</text>
    <text x="${cx}" y="${cy+35}" text-anchor="middle" font-family="Noto Sans,sans-serif" font-size="10" font-weight="700" fill="hsl(215,16%,60%)" letter-spacing="1">${bwScoreLabel(score).toUpperCase()}</text>
  </svg>`;}

/* ── Bullet gauge SVG ── */
function bwBullet(marker,latestV){
  const id=++_bwUid,W=260,H=16,BH=6,BY=(H-BH)/2;
  const{dMin,dMax,zones}=marker,range=dMax-dMin,toX=v=>Math.min(W,Math.max(0,(v-dMin)/range*W));
  let rects='';for(const z of zones){const x1=toX(z.m),x2=toX(z.x);if(x2>x1)rects+=`<rect x="${x1.toFixed(1)}" y="${BY}" width="${(x2-x1).toFixed(1)}" height="${BH}" fill="${bwZoneColor(z.c)}" opacity="${z.c==='none'?0.2:0.75}"/>`;}
  let divs='';const seen=new Set();for(const z of zones){for(const b of[z.m,z.x]){if(seen.has(b)||b<=dMin||b>=dMax)continue;seen.add(b);const bx=toX(b).toFixed(1);divs+=`<line x1="${bx}" y1="${BY}" x2="${bx}" y2="${BY+BH}" stroke="hsl(217,24%,17%)" stroke-width="1.5"/>`;}}
  let mark='';if(latestV!==null&&latestV!==undefined){const mx=toX(latestV).toFixed(1),col=bwZoneColor(bwZoneFor(latestV,zones));mark=`<circle cx="${mx}" cy="${H/2}" r="5" fill="${col}" opacity="0.2"/><circle cx="${mx}" cy="${H/2}" r="3.5" fill="${col}"/><circle cx="${mx}" cy="${H/2}" r="1.5" fill="hsl(215,25%,20%)"/>`;}
  const pp=bwPrev(marker);let prev='';if(pp&&pp.v!==null){const px=toX(pp.v).toFixed(1);prev=`<line x1="${px}" y1="${BY-2}" x2="${px}" y2="${BY+BH+2}" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-dasharray="2,1"/>`;}
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" xmlns="http://www.w3.org/2000/svg" style="overflow:visible;display:block"><defs><clipPath id="bc${id}"><rect x="0" y="${BY}" width="${W}" height="${BH}" rx="3"/></clipPath></defs><g clip-path="url(#bc${id})"><rect x="0" y="${BY}" width="${W}" height="${BH}" rx="3" fill="hsl(215,25%,28%)"/>${rects}</g>${divs}${prev}${mark}</svg>`;}

/* ── Sparkline SVG ── */
function bwSpark(marker){
  const W=80,H=28,P=5;const pts=marker.vals.filter(p=>p.v!==null);
  if(pts.length<2)return `<svg width="${W}" height="${H}"><text x="${W/2}" y="${H/2+4}" text-anchor="middle" fill="hsl(215,16%,40%)" font-size="9" font-family="Noto Sans Mono">—</text></svg>`;
  const iW=W-P*2,iH=H-P*2,{dMin,dMax}=marker;
  const sx=i=>P+(i/(pts.length-1))*iW,sy=v=>P+(1-(v-dMin)/(dMax-dMin))*iH;
  const coords=pts.map((p,i)=>`${sx(i).toFixed(1)},${sy(p.v).toFixed(1)}`).join(' ');
  let dots='';pts.forEach((p,i)=>{const col=bwZoneColor(bwZoneFor(p.v,marker.zones)),isL=i===pts.length-1;if(isL)dots+=`<circle cx="${sx(i).toFixed(1)}" cy="${sy(p.v).toFixed(1)}" r="4.5" fill="${col}" opacity="0.18"/>`;dots+=`<circle cx="${sx(i).toFixed(1)}" cy="${sy(p.v).toFixed(1)}" r="${isL?3:2}" fill="${col}" opacity="${isL?1:0.7}"/>`;});
  return `<svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg" style="overflow:visible"><polyline points="${coords}" fill="none" stroke="hsl(215,25%,38%)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>${dots}</svg>`;}

/* ── Marker card ── */
function bwRenderCard(marker){
  const lp=bwLatest(marker),lv=lp?lp.v:null,z=bwZoneFor(lv,marker.zones),col=bwZoneColor(z),zlabel=bwZoneLabel(z);
  const pp=bwPrev(marker);let deltaHtml='';
  if(lp&&pp&&pp.v!==null){const diff=lp.v-pp.v,pct=Math.abs((diff/pp.v)*100).toFixed(1),arrow=diff>0?'↑':'↓';let dCol='hsl(215,16%,50%)';if(marker.hb===true)dCol=diff>0?ZC.good:ZC.fair;if(marker.hb===false)dCol=diff>0?ZC.fair:ZC.good;deltaHtml=`<div class="m-delta" style="color:${dCol}">${arrow}${pct}% vs ${pp.d}</div>`;}
  const valHtml=lv!==null?`<div class="m-val"><span class="m-num" style="color:${col}">${bwFmtV(lv)}</span><span class="m-unit">${marker.unit}</span></div>`:`<div class="m-na">N/A</div>`;
  return `<div class="m-card"><div class="m-accent ${z}"></div><div class="m-body"><div class="m-row1"><div class="m-name">${marker.name}</div><span class="badge ${z}">${zlabel}</span></div><div class="m-row2"><div class="m-desc">${marker.desc}</div>${valHtml}</div><div class="m-gauge">${bwBullet(marker,lv)}</div><div style="display:flex;justify-content:space-between;align-items:center"><div class="m-spark">${bwSpark(marker)}</div>${deltaHtml}</div></div></div>`;}

/* ── Score pane ── */
function bwScorePane(cat){
  const score=bwCatScore(cat),sz=bwScoreZone(score),col=bwZoneColor(sz),counts={optimal:0,good:0,fair:0,out:0};
  cat.markers.forEach(m=>{const lp=bwLatest(m);if(!lp)return;const z=bwZoneFor(lp.v,m.zones);if(counts[z]!==undefined)counts[z]++;});
  const bkd=[{z:'optimal',label:'Optimal',col:ZC.optimal},{z:'good',label:'Good',col:ZC.good},{z:'fair',label:'Borderline',col:ZC.fair},{z:'out',label:'Out of range',col:ZC.out}]
    .map(item=>`<div class="bkd-row"><div class="bkd-label"><div class="bkd-badge" style="background:${item.col}"></div>${item.label}</div><div class="bkd-count" style="color:${item.col}">${counts[item.z]}</div></div>`).join('');
  return `<div class="score-pane"><div class="score-date">Oct 7, 2025</div><div class="score-category">${cat.label}</div><div class="score-gauge-wrap">${bwGaugeSVG(score)}</div><div class="score-legend"><div class="leg-item"><div class="leg-dot" style="background:${ZC.out}"></div>Out of range</div><div class="leg-item"><div class="leg-dot" style="background:${ZC.fair}"></div>Borderline</div><div class="leg-item"><div class="leg-dot" style="background:${ZC.good}"></div>Good</div><div class="leg-item"><div class="leg-dot" style="background:${ZC.optimal}"></div>Optimal</div></div><div class="score-divider"></div><div class="score-breakdown">${bkd}</div><div class="score-desc">${cat.desc}</div></div>`;}

/* ── Overall score panel ── */
function bwOverallPanel(){
  const sc={optimal:100,good:75,fair:50,out:25};
  const all=CATS.flatMap(c=>c.markers);
  const vals=all.map(m=>{const lp=bwLatest(m);return lp?sc[bwZoneFor(lp.v,m.zones)]:null;}).filter(s=>s!==null);
  const score=vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length):0;
  const chips=CATS.map(cat=>{const s=bwCatScore(cat),scol=bwZoneColor(bwScoreZone(s));return `<a class="cat-chip" href="#section-${cat.key}" onclick="bwExpand('${cat.key}');return false;"><span class="cat-chip-icon">${cat.icon}</span><span class="cat-chip-name">${cat.label}</span><span class="cat-chip-score" style="color:${scol}">${s}</span></a>`;}).join('');
  return `<div class="overall-panel"><div class="overall-left"><div class="overall-label">Overall Health Score</div>${bwGaugeSVG(score)}</div><div class="overall-right"><div class="overall-title">Score by Category</div><div class="cat-chips">${chips}</div></div></div>`;}

/* ── Summary bar ── */
function bwSummaryBar(){
  const all=CATS.flatMap(c=>c.markers),counts={optimal:0,good:0,fair:0,out:0};
  all.forEach(m=>{const lp=bwLatest(m);if(!lp)return;const z=bwZoneFor(lp.v,m.zones);if(counts[z]!==undefined)counts[z]++;});
  return [{label:'Optimal',count:counts.optimal,col:ZC.optimal},{label:'Good',count:counts.good,col:ZC.good},{label:'Borderline',count:counts.fair,col:ZC.fair},{label:'Out of range',count:counts.out,col:ZC.out}]
    .map(p=>`<div class="sum-pill"><div class="sum-dot" style="background:${p.col}"></div><span class="sum-label">${p.label}</span><span class="sum-count">${p.count}</span></div>`).join('');}

/* ── Accordion section ── */
function bwSection(cat){
  const score=bwCatScore(cat),sz=bwScoreZone(score),col=bwZoneColor(sz),slabel=bwScoreLabel(score),counts=bwCatCounts(cat);
  const latestDate=cat.markers.reduce((acc,m)=>{const lp=bwLatest(m);return lp?lp.d:acc;},'—');
  const insCards=cat.insights.map(ins=>`<div class="ins-card"><div class="ins-tag ${ins.cls}">${ins.tag}</div><div class="ins-body">${ins.body}</div></div>`).join('');
  const miniPills=[{z:'optimal',col:ZC.optimal,n:counts.optimal},{z:'good',col:ZC.good,n:counts.good},{z:'fair',col:ZC.fair,n:counts.fair},{z:'out',col:ZC.out,n:counts.out}]
    .filter(p=>p.n>0).map(p=>`<div class="sum-mini" data-n="${p.n}"><div class="sum-mini-dot" style="background:${p.col}"></div><span class="sum-mini-count" style="color:${p.col}">${p.n}</span></div>`).join('');
  return `<section class="cat-section" id="section-${cat.key}">
    <div class="bw-section-hd" onclick="bwToggle('${cat.key}')">
      <div class="toggle-arrow"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 2L8 5L2 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <span class="section-icon">${cat.icon}</span>
      <span class="section-name">${cat.label}</span>
      <div class="section-summary">${miniPills}</div>
      <div class="section-spacer"></div>
      <div class="section-score-chip"><span class="section-score-num" style="color:${col}">${score}</span><span style="color:var(--text3);font-size:11px">${slabel}</span></div>
    </div>
    <div class="section-body"><div class="section-body-inner"><div class="section-body-pad">
      <div class="cat-body">
        ${bwScorePane(cat)}
        <div class="markers-pane">
          <div class="markers-header"><div class="markers-title">${cat.markers.length} markers</div><div class="markers-meta">Latest: ${latestDate}</div></div>
          <div class="cards-grid">${cat.markers.map(bwRenderCard).join('')}</div>
          <div class="bw-insights">${insCards}</div>
        </div>
      </div>
    </div></div></div>
  </section>`;}

/* ── Toggle / expand (global — called from inline onclick in bwSection) ── */
function bwToggle(key){document.getElementById('section-'+key)?.classList.toggle('open');}
function bwExpand(key){const el=document.getElementById('section-'+key);if(el&&!el.classList.contains('open'))el.classList.add('open');}

/* ── Tab switcher ── */
let _bwCatCharts={},_bwCatSelMk={},_bwCatExpOpen={};

function bwShowTab(tab,btn){
  btn.parentElement.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  ['bw-overview','bw-trends','bw-details','bw-recs'].forEach(id=>document.getElementById(id)?.classList.remove('active'));
  document.getElementById('bw-'+tab)?.classList.add('active');
  if(tab==='trends'&&!window._bwTrendsInit){bwInitCatCharts();window._bwTrendsInit=true;}
}

/* ── Navigate: category card → Trends tab, scroll to that category explorer ── */
function bwGoTrend(key){
  const btn=document.getElementById('bwTrendTab');
  if(btn)btn.click();
  setTimeout(()=>{
    const el=document.getElementById('bwExp-'+key);
    if(el){
      if(!_bwCatExpOpen[key])bwToggleCatExp(key);
      el.scrollIntoView({behavior:'smooth',block:'start'});
    }
  },120);
}

/* ── Overall health card (enhanced) ── */
function bwOverallDetailed(){
  const sc={optimal:100,good:75,fair:50,out:25};
  const allM=CATS.flatMap(c=>c.markers);
  const totals={optimal:0,good:0,fair:0,out:0};
  allM.forEach(m=>{const lp=bwLatest(m);if(!lp)return;const z=bwZoneFor(lp.v,m.zones);if(totals[z]!==undefined)totals[z]++;});
  const tracked=totals.optimal+totals.good+totals.fair+totals.out;
  const vals=allM.map(m=>{const lp=bwLatest(m);return lp?sc[bwZoneFor(lp.v,m.zones)]:null;}).filter(s=>s!==null);
  const oScore=vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length):0;
  const oSz=bwScoreZone(oScore),oCol=bwZoneColor(oSz);
  const catsOk=CATS.filter(c=>bwScoreZone(bwCatScore(c))==='optimal'||bwScoreZone(bwCatScore(c))==='good').length;
  // Zone bar proportions
  const segs=[{z:'optimal',c:ZC.optimal,n:totals.optimal},{z:'good',c:ZC.good,n:totals.good},{z:'fair',c:ZC.fair,n:totals.fair},{z:'out',c:ZC.out,n:totals.out}]
    .filter(s=>s.n>0).map(s=>`<div class="bw-overall-zone-seg" style="background:${s.c};flex:${s.n}"></div>`).join('');
  return `<div class="bw-overall-card">
    <div class="bw-overall-left">
      <div class="bw-overall-label">Overall Health Score</div>
      ${bwGaugeSVG(oScore)}
      <div style="font-size:10px;color:var(--text3);margin-top:4px;font-family:var(--mono)">Oct 7, 2025</div>
    </div>
    <div class="bw-overall-right">
      <div class="bw-overall-stat-grid">
        <div class="bw-overall-stat">
          <div class="bw-overall-stat-val" style="color:${oCol}">${oScore}</div>
          <div class="bw-overall-stat-lbl">Overall score</div>
        </div>
        <div class="bw-overall-stat">
          <div class="bw-overall-stat-val">${tracked}</div>
          <div class="bw-overall-stat-lbl">Markers tracked</div>
        </div>
        <div class="bw-overall-stat">
          <div class="bw-overall-stat-val" style="color:${ZC.optimal}">${totals.optimal+totals.good}</div>
          <div class="bw-overall-stat-lbl">Optimal or good</div>
        </div>
        <div class="bw-overall-stat">
          <div class="bw-overall-stat-val" style="color:${ZC.out}">${totals.fair+totals.out}</div>
          <div class="bw-overall-stat-lbl">Need attention</div>
        </div>
      </div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:8px;font-weight:600">${catsOk} of ${CATS.length} categories in Optimal or Good range</div>
      <div class="bw-overall-zone-bar">${segs}</div>
      <div class="bw-overall-zone-legend">
        ${[{z:'optimal',c:ZC.optimal,n:totals.optimal,l:'Optimal'},{z:'good',c:ZC.good,n:totals.good,l:'Good'},{z:'fair',c:ZC.fair,n:totals.fair,l:'Borderline'},{z:'out',c:ZC.out,n:totals.out,l:'Out of range'}]
          .filter(s=>s.n>0).map(s=>`<div class="bw-overall-zone-item"><div class="bw-overall-zone-dot" style="background:${s.c}"></div>${s.n} ${s.l}</div>`).join('')}
      </div>
    </div>
  </div>`;}

/* ── Enhanced category card grid ── */
function bwCatGrid(){
  return '<div class="bw-cat-grid">'+CATS.map(cat=>{
    const score=bwCatScore(cat),sz=bwScoreZone(score),col=bwZoneColor(sz),counts=bwCatCounts(cat);
    const total=counts.optimal+counts.good+counts.fair+counts.out||1;
    const segs=[{c:ZC.optimal,n:counts.optimal},{c:ZC.good,n:counts.good},{c:ZC.fair,n:counts.fair},{c:ZC.out,n:counts.out}]
      .filter(s=>s.n>0).map(s=>`<div class="bw-zone-seg" style="background:${s.c};flex:${s.n}"></div>`).join('');
    const latestDate=cat.markers.reduce((acc,m)=>{const lp=bwLatest(m);return lp?lp.d:acc;},'—');
    // Flagged markers (borderline or out of range)
    const flagged=cat.markers.filter(m=>{const lp=bwLatest(m);if(!lp)return false;const z=bwZoneFor(lp.v,m.zones);return z==='out'||z==='fair';});
    const flaggedHtml=flagged.length?`<div class="bw-cat-flagged">${flagged.map(m=>{const lp=bwLatest(m),z=bwZoneFor(lp.v,m.zones),c2=bwZoneColor(z);return `<span style="color:${c2}">${m.name}</span>`;}).join(' · ')}</div>`:'';
    // Breakdown
    const bd=[{n:counts.optimal,c:ZC.optimal,l:'Opt'},{n:counts.good,c:ZC.good,l:'Good'},{n:counts.fair,c:ZC.fair,l:'Bord'},{n:counts.out,c:ZC.out,l:'Out'}]
      .filter(s=>s.n>0).map(s=>`<span style="color:${s.c}">${s.n} ${s.l}</span>`).join('');
    return `<div class="bw-cat-card" onclick="bwGoTrend('${cat.key}')">
      <div class="bw-cat-card-top"><span class="bw-cat-icon">${cat.icon}</span><span class="bw-cat-score" style="color:${col}">${score}</span></div>
      <div class="bw-cat-name">${cat.label}</div>
      <div class="bw-zone-bar">${segs}</div>
      <div class="bw-cat-breakdown">${bd}</div>
      ${flaggedHtml}
      <div class="bw-cat-date">${cat.markers.length} markers · ${latestDate}</div>
    </div>`;
  }).join('')+'</div>';}

/* ── Alert strip (Overview) ── */
function bwAlerts(){
  const alerts=[];
  CATS.forEach(cat=>cat.insights.forEach(ins=>{
    const tier=ins.cls==='t-danger'?'danger':ins.cls==='t-warn'?'warn':null;
    if(tier)alerts.push({tier,tag:ins.tag,body:ins.body,catLabel:cat.label,catIcon:cat.icon});
  }));
  const danger=alerts.filter(a=>a.tier==='danger'),warn=alerts.filter(a=>a.tier==='warn');
  let h='';
  if(danger.length){h+=`<div class="bw-alert-hd"><span style="color:var(--critical)">⚠</span> Critical — ${danger.length} signal${danger.length>1?'s':''} require immediate attention</div><div class="bw-alert-grid">${danger.map(a=>`<div class="bw-alert-card danger"><div class="bw-alert-badge danger">⚠ Critical</div><div class="bw-alert-title">${a.tag.replace(/^[⚠↗✓◎↑↓]\s*/,'')}</div><div class="bw-alert-body">${a.body}</div><div class="bw-alert-cat">${a.catIcon} ${a.catLabel}</div></div>`).join('')}</div>`;}
  if(warn.length){h+=`<div class="bw-alert-hd"><span style="color:var(--warning)">↗</span> Attention — ${warn.length} borderline signals to monitor</div><div class="bw-alert-grid">${warn.map(a=>`<div class="bw-alert-card warn"><div class="bw-alert-badge warn">↗ Attention</div><div class="bw-alert-title">${a.tag.replace(/^[⚠↗✓◎↑↓]\s*/,'')}</div><div class="bw-alert-body">${a.body}</div><div class="bw-alert-cat">${a.catIcon} ${a.catLabel}</div></div>`).join('')}</div>`;}
  return h;}

/* ── Per-category Marker Explorer (Trends tab) ── */
function bwTrendsPage(){
  return CATS.map((cat,i)=>{
    const score=bwCatScore(cat),sz=bwScoreZone(score),col=bwZoneColor(sz);
    const isOpen=i===0;
    _bwCatExpOpen[cat.key]=isOpen;
    _bwCatSelMk[cat.key]=new Set(cat.markers.map(m=>m.name));
    const mkBtns=cat.markers.map(m=>{
      const lp=bwLatest(m),z=bwZoneFor(lp?.v,m.zones),c2=bwZoneColor(z);
      return `<button class="bw-mk-btn sel" style="background:${c2};border-color:${c2}" onclick="bwToggleMkCat('${cat.key}','${m.name.replace(/'/g,"\\'")}',this,'${c2}')">${m.name}</button>`;
    }).join('');
    return `<div class="bw-cat-explorer-section" id="bwExp-${cat.key}">
      <div class="bw-cat-exp-hd" onclick="bwToggleCatExp('${cat.key}')">
        <div class="toggle-arrow" id="bwExpArrow-${cat.key}" style="${isOpen?'transform:rotate(90deg)':''}">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 2L8 5L2 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <span class="section-icon">${cat.icon}</span>
        <span class="section-name">${cat.label}</span>
        <div class="section-spacer"></div>
        <div class="section-score-chip"><span class="section-score-num" style="color:${col}">${score}</span><span style="color:var(--text3);font-size:11px">${bwScoreLabel(score)}</span></div>
      </div>
      <div class="bw-cat-exp-body" id="bwExpBody-${cat.key}" style="display:${isOpen?'block':'none'}">
        <div class="bw-marker-filter" style="margin-bottom:14px">${mkBtns}</div>
        <div style="position:relative;height:220px"><canvas id="bwExpChart-${cat.key}"></canvas></div>
      </div>
    </div>`;
  }).join('');}

function bwToggleCatExp(key){
  const body=document.getElementById('bwExpBody-'+key);
  const arrow=document.getElementById('bwExpArrow-'+key);
  if(!body)return;
  const isOpen=!_bwCatExpOpen[key];
  _bwCatExpOpen[key]=isOpen;
  body.style.display=isOpen?'block':'none';
  arrow.style.transform=isOpen?'rotate(90deg)':'';
  if(isOpen&&!_bwCatCharts[key])setTimeout(()=>bwDrawCatChart(key),50);
}

function bwInitCatCharts(){
  CATS.forEach(cat=>{
    if(!_bwCatSelMk[cat.key])_bwCatSelMk[cat.key]=new Set(cat.markers.map(m=>m.name));
  });
  // Only draw the first (open) chart immediately
  bwDrawCatChart(CATS[0].key);
}

function bwToggleMkCat(catKey,name,btn,col){
  const sel=_bwCatSelMk[catKey];
  if(sel.has(name)){if(sel.size>1)sel.delete(name);}else{sel.add(name);}
  const active=sel.has(name);
  btn.classList.toggle('sel',active);
  btn.style.background=active?col:'';btn.style.borderColor=active?col:'';
  bwDrawCatChart(catKey);
}

function bwDrawCatChart(catKey){
  const cat=CATS.find(c=>c.key===catKey);if(!cat)return;
  const ctx=document.getElementById('bwExpChart-'+catKey);if(!ctx)return;
  if(_bwCatCharts[catKey]){_bwCatCharts[catKey].destroy();_bwCatCharts[catKey]=null;}
  const selM=cat.markers.filter(m=>_bwCatSelMk[catKey]?.has(m.name));
  const allDates=new Set();
  selM.forEach(m=>m.vals.filter(v=>v.v!==null).forEach(v=>allDates.add(v.d)));
  const months={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  const parseD=d=>{const p=d.split(" '");return new Date(2000+parseInt(p[1]),months[p[0]]||0,1);};
  const sortedDates=[...allDates].sort((a,b)=>parseD(a)-parseD(b));
  const datasets=selM.map(m=>{
    const{dMin,dMax}=m,range=dMax-dMin;
    const data=sortedDates.map(d=>{const pt=m.vals.find(v=>v.d===d&&v.v!==null);return pt?+((pt.v-dMin)/range*100).toFixed(1):null;});
    const lp=bwLatest(m),z=bwZoneFor(lp?.v,m.zones),col=bwZoneColor(z);
    return{label:m.name,data,borderColor:col,backgroundColor:cfill(col,0.09),borderWidth:2,pointRadius:3.5,pointHoverRadius:5.5,tension:0.35,fill:false,spanGaps:true};
  });
  _bwCatCharts[catKey]=new Chart(ctx,{type:'line',data:{labels:sortedDates,datasets},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},tooltip:{backgroundColor:cv('--tooltip-bg'),borderColor:cv('--tooltip-border'),borderWidth:1,titleColor:cv('--text'),bodyColor:cv('--text2'),padding:10,
        callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.y!==null?c.parsed.y.toFixed(1)+'% of range':'—'}`}}},
      scales:{x:{grid:{color:cv('--chart-grid')},ticks:{color:cv('--text3'),font:{size:10}}},
        y:{min:0,max:100,grid:{color:cv('--chart-grid')},ticks:{color:cv('--text3'),font:{size:10},callback:v=>v+'%'},
          title:{display:true,text:'% of range',color:cv('--text3'),font:{size:10}}}}}}); }

/* ── Recommendations ── */
function bwRecs(){
  const tiers={danger:[],warn:[],info:[],ok:[]};
  CATS.forEach(cat=>cat.insights.forEach(ins=>{
    const t=ins.cls==='t-danger'?'danger':ins.cls==='t-warn'?'warn':ins.cls==='t-info'?'info':'ok';
    tiers[t].push({...ins,catLabel:cat.label,catIcon:cat.icon});
  }));
  const card=(ins,tier)=>`<div class="bw-rec-card ${tier}"><div class="bw-rec-badge ${tier}">${{danger:'⚠ Critical',warn:'↗ Attention',info:'◎ Monitoring',ok:'✓ Positive'}[tier]}</div><div class="bw-rec-title">${ins.tag.replace(/^[⚠↗✓◎↑↓]\s*/,'')}</div><div class="bw-rec-body">${ins.body}</div><div class="bw-rec-cat">${ins.catIcon} ${ins.catLabel}</div></div>`;
  let h='';
  if(tiers.danger.length)h+=`<div class="bw-rec-section"><span style="color:var(--critical)">⚠</span> Critical (${tiers.danger.length})</div><div class="bw-rec-grid">${tiers.danger.map(i=>card(i,'danger')).join('')}</div>`;
  if(tiers.warn.length)h+=`<div class="bw-rec-section"><span style="color:var(--warning)">↗</span> Attention (${tiers.warn.length})</div><div class="bw-rec-grid">${tiers.warn.map(i=>card(i,'warn')).join('')}</div>`;
  if(tiers.info.length)h+=`<div class="bw-rec-section"><span style="color:var(--accent1)">◎</span> Monitoring (${tiers.info.length})</div><div class="bw-rec-grid">${tiers.info.map(i=>card(i,'info')).join('')}</div>`;
  if(tiers.ok.length)h+=`<div class="bw-rec-section"><span style="color:var(--accent5)">✓</span> Positive signals (${tiers.ok.length})</div><div class="bw-rec-grid">${tiers.ok.map(i=>card(i,'ok')).join('')}</div>`;
  return h;}

/* ── Page renderer ── */
function rBiomarkers(){
  const totalMarkers=CATS.flatMap(c=>c.markers).length;
  // Compute zone counts and overall score for stat strip
  const _sc={optimal:100,good:75,fair:50,out:25};
  const _tot={optimal:0,good:0,fair:0,out:0};
  CATS.flatMap(c=>c.markers).forEach(m=>{const lp=bwLatest(m);if(!lp)return;const z=bwZoneFor(lp.v,m.zones);if(_tot[z]!==undefined)_tot[z]++;});
  const _vals=CATS.flatMap(c=>c.markers).map(m=>{const lp=bwLatest(m);return lp?_sc[bwZoneFor(lp.v,m.zones)]:null;}).filter(s=>s!==null);
  const _oScore=_vals.length?Math.round(_vals.reduce((a,b)=>a+b,0)/_vals.length):0;
  const _oCol=bwZoneColor(bwScoreZone(_oScore));
  return `<div class="bw-wrap">
    <div class="tab-bar">
      <div class="tab active" onclick="bwShowTab('overview',this)">Overview</div>
      <div class="tab" id="bwTrendTab" onclick="bwShowTab('trends',this)">Trends</div>
      <div class="tab" onclick="bwShowTab('details',this)">Details</div>
      <div class="tab" onclick="bwShowTab('recs',this)">Recommendations</div>
    </div>
    <div class="stat-strip">
      <div class="stat-cell"><div class="stat-lbl">Health Score</div><div class="stat-val" style="color:${_oCol}">${_oScore}</div>${tElRaw(bwScoreLabel(_oScore),'nt')}<div class="stat-sub">${totalMarkers} markers · 8 categories</div><div class="stat-bar" style="background:${_oCol}"></div></div>
      <div class="stat-cell"><div class="stat-lbl">Optimal</div><div class="stat-val" style="color:var(--accent5)">${_tot.optimal}</div>${tElRaw('▲ in optimal zone','up')}<div class="stat-sub">markers in optimal zone</div><div class="stat-bar" style="background:var(--accent5)"></div></div>
      <div class="stat-cell"><div class="stat-lbl">Good</div><div class="stat-val" style="color:var(--accent1)">${_tot.good}</div>${tElRaw('▲ in good zone','up')}<div class="stat-sub">markers in good zone</div><div class="stat-bar" style="background:var(--accent1)"></div></div>
      <div class="stat-cell"><div class="stat-lbl">Borderline</div><div class="stat-val" style="color:var(--accent3)">${_tot.fair}</div>${_tot.fair>0?tElRaw('▲ need improvement','nt'):tElRaw('▼ none borderline','up')}<div class="stat-sub">markers to improve</div><div class="stat-bar" style="background:var(--accent3)"></div></div>
      <div class="stat-cell"><div class="stat-lbl">Out of Range</div><div class="stat-val" style="color:var(--accent2)">${_tot.out}</div>${_tot.out>0?tElRaw('⚠ need attention','dn'):tElRaw('▼ none critical','up')}<div class="stat-sub">markers need attention</div><div class="stat-bar" style="background:var(--accent2)"></div></div>
      <div class="stat-cell"><div class="stat-lbl">Latest Draw</div><div class="stat-val" style="font-size:16px">Oct '25</div>${tElRaw('→ Oct 7, 2025','info')}<div class="stat-sub">Oct 7, 2025 · ${CATS.length} categories</div><div class="stat-bar" style="background:var(--accent6)"></div></div>
    </div>
    <!-- Overview -->
    <div id="bw-overview" class="page active">
      <div id="bwOverall"></div>
      <div id="bwCatGrid"></div>
      <div id="bwAlerts"></div>
    </div>
    <!-- Trends: one explorer per category -->
    <div id="bw-trends" class="page">
      <div id="bwTrends"></div>
    </div>
    <!-- Details: full accordion with marker cards + insights -->
    <div id="bw-details" class="page">
      <div id="bwSections"></div>
    </div>
    <!-- Recommendations -->
    <div id="bw-recs" class="page">
      <div id="bwRecs"></div>
    </div>
  </div>`;}

function initBiomarkers(){
  _bwUid=0;
  window._bwTrendsInit=false;
  _bwCatCharts={};_bwCatSelMk={};_bwCatExpOpen={};
  // Overview
  document.getElementById('bwOverall').innerHTML=bwOverallDetailed();
  document.getElementById('bwCatGrid').innerHTML=bwCatGrid();
  document.getElementById('bwAlerts').innerHTML=bwAlerts();
  // Trends
  document.getElementById('bwTrends').innerHTML=bwTrendsPage();
  // Details accordion
  document.getElementById('bwSections').innerHTML=CATS.map(bwSection).join('');
  document.getElementById('section-'+CATS[0].key)?.classList.add('open');
  // Recommendations
  document.getElementById('bwRecs').innerHTML=bwRecs();
}
</script></body></html>
